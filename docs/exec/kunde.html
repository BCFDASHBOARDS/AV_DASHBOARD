<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kundendetail &mdash; BCF Dashboard</title>
<style>
:root {
  --bg:#f5f6f8; --surface:#ffffff; --border:#e1e4e8;
  --text:#1a1e27; --text-sec:#6b7280; --accent:#1c5fa6;
  --green:#16a34a; --bar-bg:#e8edf5; --bar-fill:#3b82f6;
  --shadow:0 1px 4px rgba(0,0,0,.08); --r:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  padding:0 0 48px;-webkit-font-smoothing:antialiased;}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  position:sticky;top:0;z-index:10;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-bar a{display:inline-block;padding:14px 20px 12px;font-size:13px;font-weight:500;
  color:var(--text-sec);text-decoration:none;border-bottom:2px solid transparent;
  white-space:nowrap;transition:color .15s,border-color .15s;}
.tab-bar a:hover{color:var(--text);}
.tab-bar a.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.page-content{padding:20px 24px 0;max-width:900px;}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
  color:var(--accent);text-decoration:none;padding:5px 12px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);transition:background .12s;}
.back-btn:hover{background:#eff6ff;}
.page-header{margin-bottom:16px;}
.page-header h1{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.page-header .sub{font-size:12px;color:var(--text-sec);margin-top:3px;}
.kpi-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:16px 20px;flex:1 1 160px;min-width:140px;}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-sec);margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1;}
.widget-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.widget-header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);}
.widget-title{font-size:13px;font-weight:700;letter-spacing:-.1px;}
.art-table{width:100%;border-collapse:collapse;font-size:12px;}
.art-table th{padding:8px 18px;text-align:left;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.4px;color:var(--text-sec);
  border-bottom:1px solid var(--border);background:#f9fafb;}
.art-table th.r,.art-table td.r{text-align:right;}
.art-table td{padding:8px 18px;border-bottom:1px solid #f1f3f6;vertical-align:top;}
.art-table tr:last-child td{border-bottom:none;}
.art-table tr:hover td{background:#f8fafc;}
.art-artnr{font-family:monospace;font-size:11px;color:var(--text-sec);}
.art-text{font-weight:600;color:var(--text);}
.art-wert{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
.bar-wrap{height:4px;background:var(--bar-bg);border-radius:2px;overflow:hidden;margin-top:4px;min-width:60px;}
.bar-fill{height:100%;background:var(--bar-fill);border-radius:2px;}
.state-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:40px 32px;text-align:center;margin-bottom:14px;
  color:var(--text-sec);font-size:13px;}
.notice-bar{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r);
  padding:10px 16px;margin-bottom:14px;font-size:12px;color:#92400e;
  display:flex;align-items:center;gap:8px;}
.ts-bar{font-size:11px;color:var(--text-sec);padding-top:4px;}
@media(max-width:599px){
  .page-content{padding:12px 12px 0;}.tab-bar{padding:0 12px;}
  .tab-bar a{padding:12px 14px 10px;}
  .art-table th,.art-table td{padding:7px 10px;}.kpi-card{padding:12px 14px;}
}
@media(min-width:1024px){.page-content{padding:24px 32px 0;}}
</style>
</head>
<body>

<nav class="tab-bar">
  <a href="auftragsbestand.html">Auftragsbestand</a>
  <a href="material.html">Material</a>
  <a href="presserei.html">Presserei</a>
  <a href="pressenbelegung.html">Pressenbelegung</a>
  <a href="magazinierung.html">Magazinierung</a>
</nav>

<div class="page-content">
  <div class="back-row">
    <a class="back-btn" href="auftragsbestand.html">&#8592; Key Accounts</a>
  </div>

  <div id="notice-bar" class="notice-bar" style="display:none">
    <span>&#9888;</span><span id="notice-text"></span>
  </div>

  <div id="root-loading" class="state-card">Daten werden geladen&hellip;</div>

  <div id="root-data" style="display:none">
    <div class="page-header">
      <h1 id="kd-title">&mdash;</h1>
      <div class="sub" id="kd-sub"></div>
    </div>

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Auftragsbestand</div>
        <div class="kpi-value" id="kd-gesamt">&mdash;</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Artikel</div>
        <div class="kpi-value" id="kd-count">&mdash;</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Anteil Gesamt</div>
        <div class="kpi-value" id="kd-share">&mdash;</div>
      </div>
    </div>

    <div class="widget-card">
      <div class="widget-header">
        <span class="widget-title">Auftr&auml;ge nach Artikel</span>
      </div>
      <table class="art-table">
        <thead>
          <tr>
            <th>Artikel</th>
            <th class="r">Wert</th>
            <th class="r">Anteil</th>
          </tr>
        </thead>
        <tbody id="art-tbody"></tbody>
      </table>
    </div>

    <div class="ts-bar" id="ts-bar"></div>
  </div>
</div>

<script>

(function () {
"use strict";

/* \u2500\u2500 label map for consolidated keys \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
var KD_LABELS = {
  "Wuerth":    "W\u00fcrth",
  "ITW":       "ITW",
  "Kyocera":   "Kyocera Group",
  "Hilti":     "Hilti",
  "Milwaukee": "Milwaukee"
};
function kundeLabel(k) { return KD_LABELS[k] || k; }

function fmtEur(v) {
  if (v == null || isNaN(+v)) return "\u2014";
  return Math.round(+v).toLocaleString("de-DE") + " \u20ac";
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function showNotice(msg) {
  var nb = document.getElementById("notice-bar");
  var nt = document.getElementById("notice-text");
  if (nb && nt) { nt.innerHTML = msg; nb.style.display = ""; }
}
function showData() {
  document.getElementById("root-loading").style.display = "none";
  document.getElementById("root-data").style.display    = "";
}

/* \u2500\u2500 URL params \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
var params   = new URLSearchParams(window.location.search);
var kundeKey = params.get("k")   || "";
/* raw param may contain multiple raw keys joined by | (for consolidated accounts) */
var rawParam = params.get("raw") || "";
var rawKeys  = rawParam ? rawParam.split("|") : [];

/* \u2500\u2500 Lookup helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
/* Tries kundeKey first, then each rawKey, returns first non-empty match */
function detailLookup(kunden_detail) {
  if (!kunden_detail) return [];
  if (kunden_detail[kundeKey] && kunden_detail[kundeKey].length) return kunden_detail[kundeKey];
  for (var i = 0; i < rawKeys.length; i++) {
    var d = kunden_detail[rawKeys[i]];
    if (d && d.length) return d;
  }
  return [];
}

/* Sum alle_kunden rows matching kundeKey OR any rawKey */
function sumKunde(kundenArr, gesamt) {
  var total = 0;
  for (var i = 0; i < kundenArr.length; i++) {
    var name = kundenArr[i].Kunde || kundenArr[i].kunde || "";
    var wert = +kundenArr[i].Wert  || +kundenArr[i].wert  || 0;
    if (name === kundeKey) { total += wert; continue; }
    for (var r = 0; r < rawKeys.length; r++) {
      if (name === rawKeys[r]) { total += wert; break; }
    }
  }
  return total;
}

fetch("../_data/auftragsbestand.json?t=" + Date.now())
  .then(function(r) {
    if (r.status === 404) return { _kein_datenstand: true };
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.text().then(function(txt) {
      if (txt.charCodeAt(0) === 0xFEFF) txt = txt.slice(1);
      try { return JSON.parse(txt); }
      catch(e) { throw new Error("JSON: " + e.message); }
    });
  })
  .then(function(data) {
    showData();

    if (data._kein_datenstand) {
      showNotice("<b>Noch kein Datenstand</b> \u2014 bitte run_all.ps1 ausf\u00fchren.");
      document.getElementById("kd-title").textContent = kundeLabel(kundeKey) || "\u2014";
      return;
    }

    /* Title */
    var displayName = kundeLabel(kundeKey) || kundeKey || rawKeys[0] || "\u2014";
    document.title = displayName + " \u2014 BCF Dashboard";
    document.getElementById("kd-title").textContent = displayName;

    /* Timestamp */
    if (data.timestamp) {
      try {
        document.getElementById("ts-bar").textContent =
          "Datenstand: " + new Date(data.timestamp).toLocaleString("de-DE");
      } catch(e) {}
    }

    var gesamtAll = +data.gesamtbestand || 0;
    var kundenArr = Array.isArray(data.alle_kunden) ? data.alle_kunden : [];

    /* Kunden-Gesamtwert \u2014 sum all matching rows (handles both consolidated + raw) */
    var kundeGes = sumKunde(kundenArr, gesamtAll);

    /* Artikel-Detail \u2014 try consolidated key first, then raw keys */
    var detail = detailLookup(data.kunden_detail);

    document.getElementById("kd-gesamt").textContent = fmtEur(kundeGes);
    var shareStr = gesamtAll > 0 ? (kundeGes / gesamtAll * 100).toFixed(1) + " %" : "\u2014";
    document.getElementById("kd-share").textContent = shareStr;
    document.getElementById("kd-count").textContent = detail.length;
    document.getElementById("kd-sub").textContent =
      detail.length + " Artikel \u00b7 Datenstand " +
      (data.timestamp ? new Date(data.timestamp).toLocaleDateString("de-DE") : "\u2014");

    /* Artikel-Tabelle */
    var maxWert = detail.length > 0 ? (+detail[0].wert || 0) : 1;
    var tbody   = document.getElementById("art-tbody");
    var html    = "";

    if (detail.length === 0) {
      html = "<tr><td colspan=\"3\" style=\"text-align:center;color:#6b7280;padding:24px\">" +
        "Keine Artikeldaten verf\u00fcgbar</td></tr>";
    } else {
      for (var ai = 0; ai < detail.length; ai++) {
        var art  = detail[ai];
        var wert = +art.wert || 0;
        var pct  = maxWert > 0 ? Math.round(wert / maxWert * 100) : 0;
        var shr  = kundeGes > 0 ? (wert / kundeGes * 100).toFixed(1) : "0.0";
        html += "<tr>" +
          "<td><div class=\"art-text\">" + esc(art.text || "\u2014") + "</div>" +
              "<div class=\"art-artnr\">"  + esc(art.artnr || "") + "</div></td>" +
          "<td class=\"r art-wert\">" + fmtEur(wert) +
            "<div class=\"bar-wrap\"><div class=\"bar-fill\" style=\"width:" + pct + "%\"></div></div></td>" +
          "<td class=\"r\">" + shr + " %</td>" +
        "</tr>";
      }
    }
    tbody.innerHTML = html;
  })
  .catch(function(err) {
    document.getElementById("root-loading").style.display = "none";
    showData();
    showNotice("<b>Ladefehler:</b> " + esc(String(err.message || err)));
    document.getElementById("kd-title").textContent = kundeLabel(kundeKey) || "—";
    console.error(err);
  });

}());
</script>

</body>
</html>
