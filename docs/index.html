<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AV Dashboard · BCF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ── Tokens ──────────────────────────────────────────────────── */
:root{
  --s950:#0d141d;--s900:#121d28;--s850:#172534;--s800:#1c2c3d;--s700:#253647;
  --line:rgba(255,255,255,.08);--line-s:rgba(255,255,255,.14);
  --ink:#eaf1f8;--muted:#8497a9;--dim:#5d6f80;
  --amber:#ffb13d;--amber2:#f5991a;--amber-g:rgba(255,177,61,.15);
  --cyan:#5ec6d8;--green:#5fce98;--red:#f0796b;--violet:#a78bfa;
  --r:10px;--maxw:1400px;
  --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(1100px 500px at 85% -5%,rgba(255,177,61,.07),transparent 60%),
    radial-gradient(800px 450px at -5% 15%,rgba(94,198,216,.05),transparent 55%),
    var(--s950);
  color:var(--ink);
  font-family:"IBM Plex Sans",-apple-system,system-ui,sans-serif;
  font-size:13px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
.mono{font-family:"IBM Plex Mono",monospace;font-feature-settings:"tnum" 1}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px}

/* ── Header ──────────────────────────────────────────────────── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(13,20,29,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:0 16px;
}
.hrow{
  max-width:var(--maxw);margin:0 auto;
  display:flex;align-items:center;gap:12px;
  padding:10px 0;
}
.mark{
  width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(145deg,var(--amber2),var(--amber));
  display:grid;place-items:center;
  font-family:"Saira Condensed",sans-serif;font-weight:700;
  font-size:16px;color:#1a0d00;
  box-shadow:0 4px 14px rgba(255,177,61,.25);
}
h1{
  font-family:"Saira Condensed",sans-serif;font-weight:700;
  font-size:20px;letter-spacing:.3px;margin:0;line-height:1;flex:1;
}
h1 small{display:block;font-size:10.5px;color:var(--muted);font-weight:500;letter-spacing:.2px;margin-top:1px}
.stamp{
  font-size:11px;color:var(--dim);white-space:nowrap;
  border:1px solid var(--line-s);border-radius:999px;
  padding:4px 10px;
}
.stamp b{color:var(--amber);font-weight:600}

/* ── Tab-Nav ─────────────────────────────────────────────────── */
nav{
  background:rgba(13,20,29,.88);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  position:sticky;top:55px;z-index:190;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
nav::-webkit-scrollbar{display:none}
.navrow{
  max-width:var(--maxw);margin:0 auto;
  display:flex;padding:0 16px;min-width:max-content;
}
nav button{
  appearance:none;background:none;border:0;cursor:pointer;
  white-space:nowrap;color:var(--muted);
  font-family:"Saira Condensed",sans-serif;font-weight:600;
  font-size:14px;letter-spacing:.4px;
  padding:9px 13px 11px;position:relative;
  transition:color .15s;
}
nav button:hover{color:var(--ink)}
nav button.active{color:var(--amber)}
nav button.active::after{
  content:"";position:absolute;left:10px;right:10px;bottom:-1px;
  height:2px;background:var(--amber);border-radius:2px;
}

/* ── Main ────────────────────────────────────────────────────── */
main{padding:14px 16px calc(20px + var(--safe-b));max-width:var(--maxw);margin:0 auto}
.view{display:none;animation:fadeIn .25s ease both}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── Toolbar ─────────────────────────────────────────────────── */
.toolbar{
  display:flex;gap:8px;align-items:center;
  margin-bottom:10px;flex-wrap:wrap;
}
.toolbar input{
  flex:1;min-width:160px;max-width:300px;
  background:var(--s800);border:1px solid var(--line-s);
  border-radius:var(--r);padding:6px 10px;
  color:var(--ink);font-size:12px;outline:none;
  font-family:inherit;
}
.toolbar input::placeholder{color:var(--dim)}
.toolbar input:focus{border-color:var(--amber);background:var(--s850)}
.cnt{
  font-size:11px;color:var(--dim);
  background:var(--s800);border:1px solid var(--line);
  border-radius:999px;padding:3px 10px;white-space:nowrap;
}
.cnt b{color:var(--amber);font-weight:600}

/* ── Tabelle: Desktop / iPad ─────────────────────────────────── */
.tbl-wrap{
  background:var(--s900);border:1px solid var(--line);
  border-radius:var(--r);overflow:hidden;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
table{
  width:100%;border-collapse:collapse;font-size:12px;
  min-width:480px;
}
thead th{
  background:var(--s800);
  color:var(--muted);font-weight:600;
  font-family:"Saira Condensed",sans-serif;
  font-size:11px;letter-spacing:.9px;text-transform:uppercase;
  padding:8px 10px;text-align:left;
  white-space:nowrap;cursor:pointer;user-select:none;
  border-bottom:1px solid var(--line-s);
  transition:color .15s;
}
thead th:hover{color:var(--amber)}
thead th.sa::after{content:" ↑";color:var(--amber)}
thead th.sd::after{content:" ↓";color:var(--amber)}
tbody tr{border-bottom:1px solid var(--line);transition:background .1s}
tbody tr:last-child{border-bottom:0}
tbody tr:hover{background:var(--s850)}
tbody td{padding:7px 10px;color:var(--ink)}
tbody td:empty::after{content:"—";color:var(--dim)}
.num{text-align:right;font-family:"IBM Plex Mono",monospace;font-size:11.5px}

/* ── Mobile: Karten statt Tabelle ──────────────────────────── */
@media(max-width:640px){
  .tbl-wrap{background:transparent;border:none;overflow:visible}
  table,thead,tbody,tr,td{display:block;width:100%}
  thead{display:none}
  tbody tr{
    background:var(--s900);border:1px solid var(--line);
    border-radius:var(--r);margin-bottom:8px;
    padding:10px 12px;
  }
  tbody tr:hover{background:var(--s850)}
  tbody td{
    display:flex;justify-content:space-between;
    align-items:flex-start;gap:8px;
    padding:3px 0;border:none;font-size:12px;
  }
  tbody td::before{
    content:attr(data-col);
    color:var(--dim);font-size:10.5px;font-weight:500;
    letter-spacing:.3px;flex:none;max-width:45%;
    font-family:"Saira Condensed",sans-serif;letter-spacing:.6px;
    text-transform:uppercase;font-size:10px;padding-top:2px;
  }
  tbody td:empty{display:none}
  .num{text-align:right}
  .tbl-wrap table{min-width:0}
  main{padding:10px 12px calc(16px + var(--safe-b))}
  .toolbar input{max-width:none}
}

/* ── iPad Portrait (641–1023px) ─────────────────────────────── */
@media(min-width:641px) and (max-width:1023px){
  table{font-size:11.5px}
  thead th{padding:7px 8px;font-size:10px}
  tbody td{padding:6px 8px}
  nav button{font-size:13px;padding:8px 10px 10px}
}

/* ── Paginierung ─────────────────────────────────────────────── */
.pag{
  display:flex;gap:4px;align-items:center;
  margin-top:10px;flex-wrap:wrap;
}
.pag button{
  background:var(--s800);border:1px solid var(--line);
  border-radius:6px;padding:5px 9px;
  font-size:11px;color:var(--muted);cursor:pointer;
  font-family:"IBM Plex Mono",monospace;
  transition:background .12s,color .12s;
  min-width:30px;text-align:center;
}
.pag button:hover{background:var(--s700);color:var(--ink)}
.pag button.cur{background:var(--amber);color:#1a0d00;border-color:var(--amber);font-weight:700}
.pag button:disabled{opacity:.3;cursor:default}
.pag-info{font-size:11px;color:var(--dim);margin-left:4px}
@media(max-width:640px){
  .pag button{padding:7px 11px;font-size:12px;min-width:36px}
}

/* ── Leerzustand ─────────────────────────────────────────────── */
.empty{
  padding:32px 20px;text-align:center;color:var(--dim);
  font-size:13px;
}
.empty.err{color:var(--red)}

/* ── Footer ──────────────────────────────────────────────────── */
footer{
  color:var(--dim);font-size:11px;text-align:center;
  padding:16px;border-top:1px solid var(--line);
  margin-top:4px;
}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div class="mark">AV</div>
    <h1>AV Dashboard<small>BCF · Produktionsplanung &amp; BDE</small></h1>
    <span class="stamp" id="stamp">Stand: <b>—</b></span>
  </div>
</header>

<nav>
  <div class="navrow" id="nav"></div>
</nav>

<main id="main"></main>

<footer>
  BCF Baussmann · Daten via PowerShell-Export · <span id="ft-date"></span>
</footer>

<script>
// ═══════════════════════════════════════════════════════════════
// Konfiguration
// ═══════════════════════════════════════════════════════════════
const DATA = "./_data/";
const PAGE = 50;

// Tab-Definitionen: key = JSON-Dateiname (ohne .json)
const TABS = [
  { key:"auftragsbestand",    label:"Auftragsbestand" },
  { key:"pressen",            label:"Pressen"         },
  { key:"walzen",             label:"Walzen"          },
  { key:"istmengen",          label:"Istmengen"       },
  { key:"lagerbestand",       label:"Lager"           },
  { key:"draht_ubersicht",    label:"Draht Übersicht" },
  { key:"draht_bestellungen", label:"Draht Bestell."  },
  { key:"planung_pressen",    label:"Planung Pressen" },
];

// Optionale Spaltenumbenennung pro Tab (Originalname → Anzeigename)
const LABELS = {
  auftragsbestand:{},pressen:{},walzen:{},istmengen:{},
  lagerbestand:{},draht_ubersicht:{},draht_bestellungen:{},planung_pressen:{},
};

// Spalten die rechtsbündig/mono dargestellt werden (Teilstring reicht)
const NUM_HINTS = ["menge","anzahl","kg","stück","stk","preis","wert","€","qty","amount","sum","gesamt"];

// ═══════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════
const S = {};   // { [key]: { all, filtered, cols, sortCol, sortDir, page } }

// ═══════════════════════════════════════════════════════════════
// DOM aufbauen
// ═══════════════════════════════════════════════════════════════
const nav  = document.getElementById("nav");
const main = document.getElementById("main");

TABS.forEach((t, i) => {
  // Tab-Button
  const btn = document.createElement("button");
  btn.textContent = t.label;
  btn.dataset.key = t.key;
  if (i === 0) btn.classList.add("active");
  btn.onclick = () => switchTab(t.key);
  nav.appendChild(btn);

  // Panel
  const panel = document.createElement("section");
  panel.className = "view" + (i === 0 ? " active" : "");
  panel.id = "v-" + t.key;
  panel.innerHTML = '<div class="empty">Wird geladen …</div>';
  main.appendChild(panel);
});

// ═══════════════════════════════════════════════════════════════
// Tab-Wechsel
// ═══════════════════════════════════════════════════════════════
function switchTab(key) {
  document.querySelectorAll("nav button").forEach(b =>
    b.classList.toggle("active", b.dataset.key === key));
  document.querySelectorAll(".view").forEach(v =>
    v.classList.toggle("active", v.id === "v-" + key));

  // Scroll tab into view (mobile)
  const btn = nav.querySelector(`[data-key="${key}"]`);
  btn?.scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });

  if (!S[key]) loadTab(key);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ═══════════════════════════════════════════════════════════════
// Daten laden
// ═══════════════════════════════════════════════════════════════
async function loadMeta() {
  try {
    // Versuche erst _meta.json, dann dashboard_data.json
    let updated = null;
    try {
      const r = await fetch(DATA + "_meta.json?" + Date.now());
      if (r.ok) { const m = await r.json(); updated = m.updated; }
    } catch {}
    if (!updated) {
      const r = await fetch(DATA + "dashboard_data.json?" + Date.now());
      if (r.ok) { const d = await r.json(); updated = d._meta?.updated; }
    }
    if (updated) {
      const d = new Date(updated);
      const fmt = d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"})
              + " " + d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
      document.getElementById("stamp").innerHTML = "Stand: <b>" + fmt + "</b>";
      document.getElementById("ft-date").textContent = fmt;
    }
  } catch {}
}

async function loadTab(key) {
  const panel = document.getElementById("v-" + key);
  panel.innerHTML = '<div class="empty">Wird geladen …</div>';
  try {
    const r = await fetch(DATA + key + ".json?" + Date.now());
    if (!r.ok) throw new Error("HTTP " + r.status);
    const rows = await r.json();
    if (!Array.isArray(rows) || rows.length === 0) {
      panel.innerHTML = '<div class="empty">Keine Daten vorhanden.</div>';
      return;
    }
    const cols = Object.keys(rows[0]);
    S[key] = { all: rows, filtered: rows, cols, sortCol: null, sortDir: 1, page: 1 };
    renderPanel(key);
  } catch(e) {
    panel.innerHTML = `<div class="empty err">⚠ Datei nicht gefunden: <code>${key}.json</code><br><small>${e.message}</small></div>`;
  }
}

// ═══════════════════════════════════════════════════════════════
// Panel rendern
// ═══════════════════════════════════════════════════════════════
function isNum(colName) {
  const low = colName.toLowerCase();
  return NUM_HINTS.some(h => low.includes(h));
}

function renderPanel(key) {
  const { cols } = S[key];
  const lbl = LABELS[key] || {};
  const panel = document.getElementById("v-" + key);

  panel.innerHTML = `
    <div class="toolbar">
      <input type="search" id="s-${key}" placeholder="Suchen …" autocomplete="off">
      <span class="cnt" id="c-${key}"><b>…</b> Einträge</span>
    </div>
    <div class="tbl-wrap">
      <table id="t-${key}">
        <thead><tr>${cols.map((c,i) =>
          `<th data-i="${i}">${lbl[c]||c}</th>`
        ).join("")}</tr></thead>
        <tbody id="b-${key}"></tbody>
      </table>
    </div>
    <div class="pag" id="p-${key}"></div>
  `;

  // Suche
  document.getElementById("s-" + key).addEventListener("input", e => {
    const q = e.target.value.toLowerCase().trim();
    const st = S[key];
    st.filtered = q
      ? st.all.filter(r => Object.values(r).some(v => String(v??"").toLowerCase().includes(q)))
      : st.all;
    st.page = 1;
    renderBody(key);
  });

  // Sortierung
  document.querySelectorAll(`#t-${key} th`).forEach(th => {
    th.addEventListener("click", () => {
      const ci = +th.dataset.i;
      const col = cols[ci];
      const st = S[key];
      if (st.sortCol === col) st.sortDir *= -1;
      else { st.sortCol = col; st.sortDir = 1; }
      document.querySelectorAll(`#t-${key} th`).forEach(h => h.classList.remove("sa","sd"));
      th.classList.add(st.sortDir === 1 ? "sa" : "sd");
      st.filtered = [...st.filtered].sort((a, b) => {
        const va = a[col] ?? "", vb = b[col] ?? "";
        const na = parseFloat(String(va).replace(",",".")),
              nb = parseFloat(String(vb).replace(",","."));
        if (!isNaN(na) && !isNaN(nb)) return (na - nb) * st.sortDir;
        return String(va).localeCompare(String(vb),"de") * st.sortDir;
      });
      renderBody(key);
    });
  });

  renderBody(key);
}

function renderBody(key) {
  const st   = S[key];
  const { cols } = st;
  const tot  = st.filtered.length;
  const pgs  = Math.max(1, Math.ceil(tot / PAGE));
  st.page    = Math.min(st.page, pgs);
  const from = (st.page - 1) * PAGE;
  const slice = st.filtered.slice(from, from + PAGE);

  // Zähler
  document.getElementById("c-" + key).innerHTML = `<b>${tot.toLocaleString("de-DE")}</b> Einträge`;

  // Zeilen
  const tbody = document.getElementById("b-" + key);
  tbody.innerHTML = slice.map(row =>
    "<tr>" + cols.map(c => {
      const v = row[c] ?? "";
      const numCls = isNum(c) ? " class=\"num\"" : "";
      return `<td${numCls} data-col="${c}">${v}</td>`;
    }).join("") + "</tr>"
  ).join("");

  // Paginierung
  const pag = document.getElementById("p-" + key);
  if (pgs <= 1) { pag.innerHTML = ""; return; }
  let h = `<button onclick="pg('${key}',${st.page-1})" ${st.page===1?"disabled":""}>‹</button>`;
  for (let p = 1; p <= pgs; p++) {
    if (pgs > 9 && p !== 1 && p !== pgs && Math.abs(p - st.page) > 2) {
      if (p === 2 || p === pgs-1) h += "<span style='color:var(--dim);padding:0 2px'>…</span>";
      continue;
    }
    h += `<button class="${p===st.page?"cur":""}" onclick="pg('${key}',${p})">${p}</button>`;
  }
  h += `<button onclick="pg('${key}',${st.page+1})" ${st.page===pgs?"disabled":""}>›</button>`;
  h += `<span class="pag-info">${(from+1).toLocaleString("de-DE")}–${Math.min(from+PAGE,tot).toLocaleString("de-DE")} / ${tot.toLocaleString("de-DE")}</span>`;
  pag.innerHTML = h;
}

function pg(key, p) {
  S[key].page = p;
  renderBody(key);
  document.getElementById("v-" + key).scrollIntoView({ behavior:"smooth", block:"start" });
}

// ═══════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════
(async () => {
  await loadMeta();
  loadTab(TABS[0].key);
})();
</script>
</body>
</html>
