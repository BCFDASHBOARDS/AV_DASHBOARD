<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auftragsbestand &mdash; BCF Dashboard</title>
<style>
:root {
  --bg:#f5f6f8; --surface:#ffffff; --border:#e1e4e8; --text:#1a1e27;
  --text-sec:#6b7280; --accent:#1c5fa6; --green:#16a34a; --red:#dc2626;
  --bar-bg:#e8edf5; --bar-fill:#3b82f6;
  --shadow:0 1px 4px rgba(0,0,0,.08); --r:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  padding:0 0 48px;-webkit-font-smoothing:antialiased;}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  position:sticky;top:0;z-index:10;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-bar a{display:inline-block;padding:14px 20px 12px;font-size:13px;font-weight:500;
  color:var(--text-sec);text-decoration:none;border-bottom:2px solid transparent;
  white-space:nowrap;transition:color .15s,border-color .15s;}
.tab-bar a:hover{color:var(--text);}
.tab-bar a.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.page-content{padding:20px 24px 0;max-width:900px;}
.kpi-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:16px 20px;flex:1 1 160px;min-width:140px;}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-sec);margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1;}
.widget-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.widget-header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;user-select:none;
  border-bottom:1px solid var(--border);transition:background .12s;}
.widget-header:hover{background:#f8fafc;}
.widget-title{font-size:13px;font-weight:700;letter-spacing:-.1px;}
.widget-chevron{font-size:10px;color:var(--text-sec);transition:transform .2s;display:inline-block;}
.widget-chevron.collapsed{transform:rotate(-90deg);}
.row-item{padding:9px 18px;border-bottom:1px solid #f1f3f6;}
.row-item:last-child{border-bottom:none;}
.row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.row-name{font-size:13px;font-weight:600;color:var(--text);}
.row-link{color:var(--accent);text-decoration:none;}
.row-link:hover{text-decoration:underline;}
.row-right{display:flex;align-items:center;gap:10px;}
.row-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.row-share{font-size:11px;color:var(--text-sec);min-width:40px;text-align:right;}
.row-bar{height:4px;background:var(--bar-bg);border-radius:2px;overflow:hidden;}
.row-bar-fill{height:100%;background:var(--bar-fill);border-radius:2px;}
.expand-wrap{padding:8px 18px 12px;}
.expand-btn{display:block;width:100%;background:none;border:1px solid var(--border);
  border-radius:6px;padding:7px;font-size:12px;font-weight:600;color:var(--accent);
  cursor:pointer;text-align:center;transition:background .12s,border-color .12s;}
.expand-btn:hover{background:#eff6ff;border-color:var(--accent);}
/* AG expandable rows */
.ag-row-item{padding:9px 18px;border-bottom:1px solid #f1f3f6;cursor:pointer;transition:background .12s;}
.ag-row-item:last-child{border-bottom:none;}
.ag-row-item:hover{background:#f8fafc;}
.ag-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ag-row-label{display:flex;align-items:center;gap:8px;}
.ag-row-name{font-size:13px;font-weight:600;color:var(--text);}
.ag-row-chev{font-size:9px;color:var(--text-sec);transition:transform .2s;display:inline-block;}
.ag-row-chev.open{transform:rotate(90deg);}
.ag-detail-panel{background:#f8fafc;border-top:1px solid var(--border);
  padding:10px 18px 14px;display:none;}
.ag-detail-panel.open{display:block;}
.ag-detail-section{margin-bottom:10px;}
.ag-detail-section:last-child{margin-bottom:0;}
.ag-detail-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-sec);margin-bottom:6px;}
.ag-art-row{display:flex;align-items:center;justify-content:space-between;
  padding:5px 0;border-bottom:1px solid #edf0f4;}
.ag-art-row:last-child{border-bottom:none;}
.ag-art-info{flex:1;min-width:0;}
.ag-art-text{font-size:12px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-art-nr{font-size:11px;color:var(--text-sec);margin-top:1px;}
.ag-art-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ag-art-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;}
.ag-art-share{font-size:11px;color:var(--text-sec);min-width:36px;text-align:right;}
.ag-kun-row{display:flex;align-items:center;justify-content:space-between;
  padding:4px 0;border-bottom:1px solid #edf0f4;}
.ag-kun-row:last-child{border-bottom:none;}
.ag-kun-name{font-size:12px;font-weight:500;color:var(--text);}
.ag-kun-right{display:flex;align-items:center;gap:8px;}
.ag-kun-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;}
.ag-kun-share{font-size:11px;color:var(--text-sec);min-width:36px;text-align:right;}
/* Plausi + notice */
.plausi-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.plausi-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;
  border-radius:20px;font-size:11px;font-weight:600;border:1px solid;}
.plausi-badge.ok{background:#f0fdf4;color:var(--green);border-color:#bbf7d0;}
.plausi-badge.err{background:#fef2f2;color:var(--red);border-color:#fecaca;}
.plausi-dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;}
.ts-bar{font-size:11px;color:var(--text-sec);padding-top:4px;}
.state-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:40px 32px;text-align:center;margin-bottom:14px;
  color:var(--text-sec);font-size:13px;}
.notice-bar{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r);
  padding:10px 16px;margin-bottom:14px;font-size:12px;color:#92400e;
  display:flex;align-items:center;gap:8px;}
.notice-bar b{font-weight:700;}
@media(max-width:599px){
  .page-content{padding:12px 12px 0;}.tab-bar{padding:0 12px;}
  .tab-bar a{padding:12px 14px 10px;}.kpi-value{font-size:18px;}
  .kpi-card{padding:12px 14px;}.widget-header{padding:12px 14px;}
  .row-item,.ag-row-item{padding:8px 14px;}.expand-wrap{padding:6px 14px 10px;}
}
@media(min-width:600px) and (max-width:1023px){.page-content{padding:16px 16px 0;}.kpi-value{font-size:20px;}}
@media(min-width:1024px){.page-content{padding:24px 32px 0;}}
</style>
</head>
<body>

<nav class="tab-bar">
  <a href="auftragsbestand.html" class="active">Auftragsbestand</a>
  <a href="presserei.html">Presserei</a>
  <a href="material.html">Material</a>
</nav>

<div class="page-content">
  <div id="root-loading" class="state-card">Daten werden geladen&hellip;</div>

  <div id="notice-bar" class="notice-bar" style="display:none">
    <span>&#9888;</span>
    <span id="notice-text"></span>
  </div>

  <div id="root-data" style="display:none">

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Gesamtbestand</div>
        <div class="kpi-value" id="kv-gesamt">&mdash;</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Tageseingang</div>
        <div class="kpi-value" id="kv-tages">&mdash;</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Wocheneingang</div>
        <div class="kpi-value" id="kv-woche">&mdash;</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Monatseingang</div>
        <div class="kpi-value" id="kv-monat">&mdash;</div>
      </div>
    </div>

    <div class="widget-card">
      <div class="widget-header" id="wh-ka">
        <span class="widget-title">Key Accounts</span>
        <span class="widget-chevron" id="chev-ka">&#9650;</span>
      </div>
      <div id="wb-ka">
        <div id="ka-top"></div>
        <div id="ka-more" style="display:none"></div>
        <div class="expand-wrap" id="ka-xwrap" style="display:none">
          <button class="expand-btn" id="ka-xbtn"></button>
        </div>
      </div>
    </div>

    <div class="widget-card">
      <div class="widget-header" id="wh-ag">
        <span class="widget-title">Produktgruppen</span>
        <span class="widget-chevron" id="chev-ag">&#9650;</span>
      </div>
      <div id="wb-ag">
        <div id="ag-rows"></div>
        <div id="ag-more" style="display:none"></div>
        <div class="expand-wrap" id="ag-xwrap" style="display:none">
          <button class="expand-btn" id="ag-xbtn"></button>
        </div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Ankern&auml;gel gesamt</div>
        <div class="kpi-value" id="kv-anker">&mdash;</div>
      </div>
    </div>

    <div class="plausi-bar" id="plausi-bar"></div>
    <div class="ts-bar" id="ts-bar"></div>

  </div>
</div>

<script>

(function () {
"use strict";

/* \u2500\u2500 helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function fmtEur(v) {
  if (v == null || isNaN(+v)) return "\u2014";
  return Math.round(+v).toLocaleString("de-DE") + " \u20ac";
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* \u2500\u2500 Artikelgruppen labels \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
var AG_LABELS = {
  "Maschinenstifte":"Maschinenstifte","Kernschrauben":"Kernschrauben",
  "Lose_Edelstahl":"Lose Edelstahl","Industrieklammern":"Industrieklammern",
  "Drahtcoil":"Drahtcoil","Streifennaegel_KS":"Streifenn\u00e4gel KS",
  "Papertape":"Papertape","CDF_UTC":"CDF & UTC",
  "Ankernaegel_Lose":"Ankern\u00e4gel Lose","Umpack_Dachpapp":"Umpack & Dachpapp",
  "Sonstiges":"Sonstiges"
};

/* \u2500\u2500 Client-side Key-Account consolidation \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
/* Handles cases where PS regex fails to consolidate (e.g. W\u00fcrth \u00fc issue) */
var KA_RULES = [
  { re: /w.rth/i,         key: "Wuerth",    label: "W\u00fcrth" },
  { re: /\bITW\b/,        key: "ITW",       label: "ITW" },
  { re: /kyocera/i,       key: "Kyocera",   label: "Kyocera Group" },
  { re: /hilti/i,         key: "Hilti",     label: "Hilti" },
  { re: /milwaukee|tti/i, key: "Milwaukee", label: "Milwaukee" }
];

function consolidate(rawList) {
  /* Returns [{key, label, wert, rawKeys:[]}] sorted by wert desc */
  var merged = {};  /* key \u2192 {label, wert, rawKeys} */
  for (var i = 0; i < rawList.length; i++) {
    var raw  = rawList[i];
    var name = raw.Kunde || raw.kunde || "";
    var wert = +raw.Wert  || +raw.wert  || 0;
    var key  = null, label = name;
    for (var r = 0; r < KA_RULES.length; r++) {
      if (KA_RULES[r].re.test(name)) { key = KA_RULES[r].key; label = KA_RULES[r].label; break; }
    }
    if (!key) key = name;  /* non-key-account: use raw name */
    if (!merged[key]) merged[key] = { key: key, label: label, wert: 0, rawKeys: [] };
    merged[key].wert += wert;
    if (merged[key].rawKeys.indexOf(name) === -1) merged[key].rawKeys.push(name);
  }
  var result = [];
  for (var k in merged) result.push(merged[k]);
  result.sort(function(a,b){ return b.wert - a.wert; });
  return result;
}

/* \u2500\u2500 Row builders \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function rowHtml(name, wert, maxWert, total) {
  var pct   = maxWert > 0 ? Math.round(wert / maxWert * 100) : 0;
  var share = total   > 0 ? (wert / total * 100).toFixed(1) : "0.0";
  return "<div class=\"row-item\">" +
    "<div class=\"row-top\"><span class=\"row-name\">" + esc(name) + "</span>" +
    "<span class=\"row-right\"><span class=\"row-val\">" + fmtEur(wert) + "</span>" +
    "<span class=\"row-share\">" + share + " %</span></span></div>" +
    "<div class=\"row-bar\"><div class=\"row-bar-fill\" style=\"width:" + pct + "%\"></div></div>" +
  "</div>";
}

function kundeRowHtml(entry, maxWert, total) {
  var pct   = maxWert > 0 ? Math.round(entry.wert / maxWert * 100) : 0;
  var share = total   > 0 ? (entry.wert / total * 100).toFixed(1) : "0.0";
  /* Pass consolidated key + all raw keys so kunde.html can find kunden_detail */
  var href  = "kunde.html?k=" + encodeURIComponent(entry.key);
  if (entry.rawKeys.length > 0 && !(entry.rawKeys.length === 1 && entry.rawKeys[0] === entry.key)) {
    href += "&raw=" + encodeURIComponent(entry.rawKeys.join("|"));
  }
  return "<div class=\"row-item\">" +
    "<div class=\"row-top\">" +
    "<a class=\"row-name row-link\" href=\"" + esc(href) + "\">" + esc(entry.label) + " &#8250;</a>" +
    "<span class=\"row-right\"><span class=\"row-val\">" + fmtEur(entry.wert) + "</span>" +
    "<span class=\"row-share\">" + share + " %</span></span></div>" +
    "<div class=\"row-bar\"><div class=\"row-bar-fill\" style=\"width:" + pct + "%\"></div></div>" +
  "</div>";
}

/* \u2500\u2500 Widget collapse \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function bindCollapse(headerId, chevId, bodyId) {
  var hdr  = document.getElementById(headerId);
  var chev = document.getElementById(chevId);
  var body = document.getElementById(bodyId);
  if (!hdr) return;
  hdr.addEventListener("click", function () {
    var open = body.style.display !== "none";
    body.style.display = open ? "none" : "";
    chev.classList.toggle("collapsed", open);
  });
}

function bindExpand(btnId, moreId, total, fixed) {
  var btn  = document.getElementById(btnId);
  var more = document.getElementById(moreId);
  var wrap = document.getElementById(btnId.replace("-xbtn","-xwrap"));
  if (!btn || !more) return;
  var rest = total - fixed, open = false;
  btn.textContent = "+" + rest + " weitere anzeigen";
  if (wrap) wrap.style.display = "";
  btn.addEventListener("click", function () {
    open = !open;
    more.style.display = open ? "" : "none";
    btn.textContent = open ? "Weniger anzeigen" : "+" + rest + " weitere anzeigen";
  });
}

/* \u2500\u2500 AG group row with expandable detail \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function agGroupHtml(idx, agKey, label, wert, maxWert, gesamt, detail) {
  var pct   = maxWert > 0 ? Math.round(wert / maxWert * 100) : 0;
  var share = gesamt  > 0 ? (wert / gesamt * 100).toFixed(1) : "0.0";
  var hasDetail = detail && ((detail.top_artikel && detail.top_artikel.length) ||
                             (detail.top_kunden  && detail.top_kunden.length));
  var chevHtml = hasDetail
    ? "<span class=\"ag-row-chev\" id=\"ag-chev-" + idx + "\">&#9658;</span>" : "";

  var h = "<div class=\"ag-row-item\" id=\"ag-row-" + idx + "\">" +
    "<div class=\"ag-row-top\"><span class=\"ag-row-label\">" + chevHtml +
    "<span class=\"ag-row-name\">" + esc(label) + "</span></span>" +
    "<span class=\"row-right\"><span class=\"row-val\">" + fmtEur(wert) + "</span>" +
    "<span class=\"row-share\">" + share + " %</span></span></div>" +
    "<div class=\"row-bar\"><div class=\"row-bar-fill\" style=\"width:" + pct + "%\"></div></div>" +
  "</div>";

  if (!hasDetail) return h;

  var dp = "<div class=\"ag-detail-panel\" id=\"ag-detail-" + idx + "\">";
  var arts = detail.top_artikel || [];
  if (arts.length) {
    dp += "<div class=\"ag-detail-section\"><div class=\"ag-detail-title\">Top-5 Artikel</div>";
    for (var ai = 0; ai < arts.length; ai++) {
      var a = arts[ai];
      var aShare = wert > 0 ? (+a.wert / wert * 100).toFixed(1) : "0.0";
      dp += "<div class=\"ag-art-row\"><div class=\"ag-art-info\">" +
        "<div class=\"ag-art-text\">" + esc(a.text || a.artnr) + "</div>" +
        "<div class=\"ag-art-nr\">"   + esc(a.artnr) + "</div></div>" +
        "<div class=\"ag-art-right\"><span class=\"ag-art-val\">" + fmtEur(a.wert) + "</span>" +
        "<span class=\"ag-art-share\">" + aShare + " %</span></div></div>";
    }
    dp += "</div>";
  }
  var kuns = detail.top_kunden || [];
  if (kuns.length) {
    dp += "<div class=\"ag-detail-section\"><div class=\"ag-detail-title\">Top-5 Kunden</div>";
    for (var ki = 0; ki < kuns.length; ki++) {
      var ku = kuns[ki];
      var kShare = wert > 0 ? (+ku.wert / wert * 100).toFixed(1) : "0.0";
      dp += "<div class=\"ag-kun-row\"><span class=\"ag-kun-name\">" + esc(ku.kunde) + "</span>" +
        "<div class=\"ag-kun-right\"><span class=\"ag-kun-val\">" + fmtEur(ku.wert) + "</span>" +
        "<span class=\"ag-kun-share\">" + kShare + " %</span></div></div>";
    }
    dp += "</div>";
  }
  dp += "</div>";
  return h + dp;
}

function bindAgToggle(idx) {
  var row   = document.getElementById("ag-row-"    + idx);
  var panel = document.getElementById("ag-detail-" + idx);
  var chev  = document.getElementById("ag-chev-"   + idx);
  if (!row || !panel) return;
  row.addEventListener("click", function () {
    var open = panel.classList.contains("open");
    panel.classList.toggle("open", !open);
    if (chev) chev.classList.toggle("open", !open);
  });
}

/* \u2500\u2500 Render \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function render(d) {
  document.getElementById("kv-gesamt").textContent = fmtEur(d.gesamtbestand);
  document.getElementById("kv-tages").textContent  = fmtEur(d.tageseingang);
  document.getElementById("kv-woche").textContent  = fmtEur(d.wocheneingang);
  document.getElementById("kv-monat").textContent  = fmtEur(d.monatseingang);
  document.getElementById("kv-anker").textContent  = fmtEur(d.davon_ankernaegel);
  var gesamt = +d.gesamtbestand || 0;

  /* Key Accounts \u2014 JS consolidation */
  var raw    = Array.isArray(d.alle_kunden) ? d.alle_kunden : [];
  var kunden = consolidate(raw);
  var KA_FIXED = 3;
  var maxKa = kunden.length > 0 ? kunden[0].wert : 1;
  var kaTopH = "", kaMoreH = "";
  for (var i = 0; i < kunden.length; i++) {
    var rh = kundeRowHtml(kunden[i], maxKa, gesamt);
    if (i < KA_FIXED) kaTopH += rh; else kaMoreH += rh;
  }
  if (!kaTopH) kaTopH = "<div style=\"padding:14px 18px;color:#6b7280;font-size:13px\">Noch kein Datenstand.</div>";
  document.getElementById("ka-top").innerHTML  = kaTopH;
  document.getElementById("ka-more").innerHTML = kaMoreH;
  if (kaMoreH) bindExpand("ka-xbtn","ka-more",kunden.length,KA_FIXED);

  /* Produktgruppen */
  var agRaw    = d.artikelgruppen  || {};
  var agDetail = d.gruppen_detail  || {};
  var agArr = [];
  for (var k in agRaw) agArr.push({ key: k, label: AG_LABELS[k] || k, wert: +agRaw[k] || 0 });
  agArr.sort(function(a,b){ return b.wert - a.wert; });
  var AG_FIXED = 5, maxAg = agArr.length > 0 ? agArr[0].wert : 1;
  var agTopH = "", agMoreH = "", toggleIdxs = [];
  for (var aj = 0; aj < agArr.length; aj++) {
    var agR  = agArr[aj];
    var det  = agDetail[agR.key] || null;
    var html = agGroupHtml(aj, agR.key, agR.label, agR.wert, maxAg, gesamt, det);
    if (aj < AG_FIXED) agTopH += html; else agMoreH += html;
    if (det) toggleIdxs.push(aj);
  }
  if (!agTopH) agTopH = "<div style=\"padding:14px 18px;color:#6b7280;font-size:13px\">Noch kein Datenstand.</div>";
  document.getElementById("ag-rows").innerHTML = agTopH;
  document.getElementById("ag-more").innerHTML = agMoreH;
  if (agMoreH) bindExpand("ag-xbtn","ag-more",agArr.length,AG_FIXED);
  for (var ti = 0; ti < toggleIdxs.length; ti++) bindAgToggle(toggleIdxs[ti]);

  /* Plausi badges */
  var pl = d.plausi || {};
  function badge(ok, label, diff) {
    var cls = ok ? "ok" : "err", sym = ok ? "\u2713" : "\u2717";
    var dStr = (diff != null && +diff > 0) ? " (\u00b1" + (+diff).toFixed(4) + " \u20ac)" : "";
    return "<span class=\"plausi-badge " + cls + "\"><span class=\"plausi-dot\"></span>" +
      sym + " " + esc(label) + dStr + "</span>";
  }
  var pHtml = "";
  if (d.plausi != null || d.check_ok != null) {
    var grpOk   = pl.gruppen_ok != null ? !!pl.gruppen_ok : !!d.check_ok;
    var grpDiff = pl.diff_gruppen != null ? pl.diff_gruppen : d.check_diff;
    pHtml += badge(grpOk, "Artikelgruppen-Summe", grpDiff);
    if (pl.kunden_ok != null) pHtml += badge(!!pl.kunden_ok, "Kunden-Summe", pl.diff_kunden);
  }
  document.getElementById("plausi-bar").innerHTML = pHtml;

  /* Timestamp */
  var tsBar = document.getElementById("ts-bar");
  if (d.timestamp) {
    try { tsBar.textContent = "Datenstand: " + new Date(d.timestamp).toLocaleString("de-DE"); }
    catch(e) { tsBar.textContent = "Datenstand: " + d.timestamp; }
  }
}

function showNotice(msg) {
  var nb = document.getElementById("notice-bar");
  var nt = document.getElementById("notice-text");
  if (nb && nt) { nt.innerHTML = msg; nb.style.display = ""; }
}

function showStructure() {
  document.getElementById("root-loading").style.display = "none";
  document.getElementById("root-data").style.display    = "";
  bindCollapse("wh-ka","chev-ka","wb-ka");
  bindCollapse("wh-ag","chev-ag","wb-ag");
}

var EMPTY = { gesamtbestand:null, tageseingang:null, wocheneingang:null,
              monatseingang:null, davon_ankernaegel:null,
              alle_kunden:[], artikelgruppen:{}, gruppen_detail:{}, plausi:null };

fetch("_data/auftragsbestand.json?t=" + Date.now())
  .then(function(r) {
    if (r.status === 404) return { _kein_datenstand: true };
    if (!r.ok) return { _error: "HTTP " + r.status };
    return r.json().catch(function() { return { _error: "JSON parse-Fehler" }; });
  })
  .then(function(data) {
    if (data._kein_datenstand) {
      showStructure();
      showNotice("<b>Noch kein Datenstand</b> \u2014 bitte run_all.ps1 ausf\u00fchren.");
      render(EMPTY); return;
    }
    if (data._error) {
      showStructure();
      showNotice("<b>Ladefehler:</b> " + esc(data._error));
      render(EMPTY); return;
    }
    showStructure();
    render(data);
  })
  .catch(function(err) {
    showStructure();
    showNotice("<b>Netzwerkfehler:</b> " + esc(String(err)));
    render(EMPTY);
    console.error("Dashboard-Fehler:", err);
  });

}());
</script>

</body>
</html>
