<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auftragsbestand &mdash; BCF Dashboard</title>
<style>
:root {
  --bg:        #f5f6f8;
  --surface:   #ffffff;
  --border:    #e1e4e8;
  --text:      #1a1e27;
  --text-sec:  #6b7280;
  --accent:    #1c5fa6;
  --green:     #16a34a;
  --red:       #dc2626;
  --bar-bg:    #e8edf5;
  --bar-fill:  #3b82f6;
  --shadow:    0 1px 4px rgba(0,0,0,.08);
  --r:         8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  padding: 0 0 48px;
  -webkit-font-smoothing: antialiased;
}
.tab-bar {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; overflow-x: auto;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
  position: sticky; top: 0; z-index: 10;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-bar a {
  display: inline-block; padding: 14px 20px 12px;
  font-size: 13px; font-weight: 500; color: var(--text-sec);
  text-decoration: none; border-bottom: 2px solid transparent; white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.tab-bar a:hover { color: var(--text); }
.tab-bar a.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.page-content { padding: 20px 24px 0; max-width: 900px; }
.kpi-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); box-shadow: var(--shadow);
  padding: 16px 20px; flex: 1 1 160px; min-width: 140px;
}
.kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-sec); margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.5px; line-height: 1.1; }
.kpi-sub   { font-size: 11px; color: var(--text-sec); margin-top: 3px; }
.widget-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); box-shadow: var(--shadow);
  margin-bottom: 14px; overflow: hidden;
}
.widget-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; cursor: pointer; user-select: none;
  border-bottom: 1px solid var(--border); transition: background .12s;
}
.widget-header:hover { background: #f8fafc; }
.widget-title { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -.1px; }
.widget-chevron { font-size: 10px; color: var(--text-sec); transition: transform .2s; display: inline-block; }
.widget-chevron.collapsed { transform: rotate(-90deg); }
.row-item { padding: 9px 18px; border-bottom: 1px solid #f1f3f6; }
.row-item:last-child { border-bottom: none; }
.row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.row-name  { font-size: 13px; font-weight: 600; color: var(--text); }
.row-right { display: flex; align-items: center; gap: 10px; }
.row-val   { font-size: 13px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
.row-share { font-size: 11px; color: var(--text-sec); min-width: 40px; text-align: right; }
.row-bar   { height: 4px; background: var(--bar-bg); border-radius: 2px; overflow: hidden; }
.row-bar-fill { height: 100%; background: var(--bar-fill); border-radius: 2px; }
.expand-wrap { padding: 8px 18px 12px; }
.expand-btn {
  display: block; width: 100%; background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 7px;
  font-size: 12px; font-weight: 600; color: var(--accent);
  cursor: pointer; text-align: center; transition: background .12s, border-color .12s;
}
.expand-btn:hover { background: #eff6ff; border-color: var(--accent); }
.plausi-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.plausi-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid;
}
.plausi-badge.ok  { background: #f0fdf4; color: var(--green); border-color: #bbf7d0; }
.plausi-badge.err { background: #fef2f2; color: var(--red);   border-color: #fecaca; }
.plausi-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block; }
.ts-bar { font-size: 11px; color: var(--text-sec); padding-top: 4px; }
.state-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); box-shadow: var(--shadow);
  padding: 40px 32px; text-align: center; margin-bottom: 14px;
  color: var(--text-sec); font-size: 13px;
}
.state-card.err { color: var(--red); border-color: #fecaca; }
@media (max-width: 599px) {
  .page-content { padding: 12px 12px 0; }
  .tab-bar { padding: 0 12px; }
  .tab-bar a { padding: 12px 14px 10px; }
  .kpi-value { font-size: 18px; }
  .kpi-card  { padding: 12px 14px; }
  .widget-header { padding: 12px 14px; }
  .row-item  { padding: 8px 14px; }
  .expand-wrap { padding: 6px 14px 10px; }
}
@media (min-width: 600px) and (max-width: 1023px) {
  .page-content { padding: 16px 16px 0; }
  .kpi-value { font-size: 20px; }
}
@media (min-width: 1024px) {
  .page-content { padding: 24px 32px 0; }
}
</style>
</head>
<body>

<nav class="tab-bar">
  <a href="auftragsbestand.html" class="active">Auftragsbestand</a>
  <a href="presserei.html">Presserei</a>
</nav>

<div class="page-content">

  <div id="root-loading" class="state-card">Daten werden geladen&hellip;</div>
  <div id="root-error" class="state-card err" style="display:none">Keine Daten verf&uuml;gbar &mdash; bitte Dashboard-Update pr&uuml;fen.</div>

  <div id="root-data" style="display:none">

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Gesamtbestand</div>
        <div class="kpi-value" id="kv-gesamt">&mdash;</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Tageseingang</div>
        <div class="kpi-value" id="kv-tages">&mdash;</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Wocheneingang</div>
        <div class="kpi-value" id="kv-woche">&mdash;</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Monatseingang</div>
        <div class="kpi-value" id="kv-monat">&mdash;</div>
      </div>
    </div>

    <div class="widget-card">
      <div class="widget-header" id="wh-ka">
        <span class="widget-title">Key Accounts</span>
        <span class="widget-chevron" id="chev-ka">&#9650;</span>
      </div>
      <div id="wb-ka">
        <div id="ka-top"></div>
        <div id="ka-more" style="display:none"></div>
        <div class="expand-wrap" id="ka-xwrap" style="display:none">
          <button class="expand-btn" id="ka-xbtn"></button>
        </div>
      </div>
    </div>

    <div class="widget-card">
      <div class="widget-header" id="wh-ag">
        <span class="widget-title">Artikelgruppen</span>
        <span class="widget-chevron" id="chev-ag">&#9650;</span>
      </div>
      <div id="wb-ag">
        <div id="ag-top"></div>
        <div id="ag-more" style="display:none"></div>
        <div class="expand-wrap" id="ag-xwrap" style="display:none">
          <button class="expand-btn" id="ag-xbtn"></button>
        </div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Ankern&auml;gel gesamt</div>
        <div class="kpi-value" id="kv-anker">&mdash;</div>
      </div>
    </div>

    <div class="plausi-bar" id="plausi-bar"></div>
    <div class="ts-bar" id="ts-bar"></div>

  </div>

</div>

<script>
(function () {
"use strict";

function fmtEur(v) {
  if (v == null || isNaN(+v)) return "\u2014";
  return Math.round(+v).toLocaleString("de-DE") + " \u20ac";
}

function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

var AG_LABELS = {
  "Maschinenstifte":   "Maschinenstifte",
  "Kernschrauben":     "Kernschrauben",
  "Lose_Edelstahl":    "Lose Edelstahl",
  "Industrieklammern": "Industrieklammern",
  "Drahtcoil":         "Drahtcoil",
  "Streifennaegel_KS": "Streifenn\u00e4gel KS",
  "Papertape":         "Papertape",
  "CDF_UTC":           "CDF & UTC",
  "Ankernaegel_Lose":  "Ankern\u00e4gel Lose",
  "Umpack_Dachpapp":   "Umpack & Dachpapp",
  "Sonstiges":         "Sonstiges"
};

var KD_LABELS = {
  "Wuerth":  "W\u00fcrth",
  "ITW":     "ITW",
  "Kyocera": "Kyocera",
  "Hilti":   "Hilti"
};
function kundeLabel(k) { return KD_LABELS[k] || k; }

function rowHtml(name, wert, maxWert, total) {
  var pct   = maxWert > 0 ? Math.round(wert / maxWert * 100) : 0;
  var share = total  > 0 ? (wert / total * 100).toFixed(1) : "0.0";
  return "<div class=\"row-item\">" +
    "<div class=\"row-top\">" +
      "<span class=\"row-name\">" + esc(name) + "</span>" +
      "<span class=\"row-right\">" +
        "<span class=\"row-val\">"   + fmtEur(wert) + "</span>" +
        "<span class=\"row-share\">" + share + " %" + "</span>" +
      "</span>" +
    "</div>" +
    "<div class=\"row-bar\"><div class=\"row-bar-fill\" style=\"width:" + pct + "%\"></div></div>" +
  "</div>";
}

function bindCollapse(headerId, chevId, bodyId) {
  var hdr  = document.getElementById(headerId);
  var chev = document.getElementById(chevId);
  var body = document.getElementById(bodyId);
  if (!hdr) return;
  hdr.addEventListener("click", function () {
    var open = body.style.display !== "none";
    body.style.display = open ? "none" : "";
    if (open) { chev.classList.add("collapsed"); }
    else      { chev.classList.remove("collapsed"); }
  });
}

function bindExpand(btnId, moreId, totalCount, fixedCount) {
  var btn  = document.getElementById(btnId);
  var more = document.getElementById(moreId);
  var wrap = document.getElementById(btnId.replace("-xbtn", "-xwrap"));
  if (!btn || !more) return;
  var restCount = totalCount - fixedCount;
  var open = false;
  btn.textContent = "+" + restCount + " weitere anzeigen";
  if (wrap) wrap.style.display = "";
  btn.addEventListener("click", function () {
    open = !open;
    more.style.display = open ? "" : "none";
    btn.textContent    = open ? "Weniger anzeigen" : "+" + restCount + " weitere anzeigen";
  });
}

function render(d) {
  document.getElementById("kv-gesamt").textContent = fmtEur(d.gesamtbestand);
  document.getElementById("kv-tages").textContent  = fmtEur(d.tageseingang);
  document.getElementById("kv-woche").textContent  = fmtEur(d.wocheneingang);
  document.getElementById("kv-monat").textContent  = fmtEur(d.monatseingang);
  document.getElementById("kv-anker").textContent  = fmtEur(d.davon_ankernaegel);

  var gesamt = +d.gesamtbestand || 0;

  // Key Accounts
  var kunden = Array.isArray(d.alle_kunden) ? d.alle_kunden
             : (Array.isArray(d.top5_kunden) ? d.top5_kunden : []);
  var KA_FIXED = 3;
  var maxKa  = kunden.length > 0 ? (+kunden[0].Wert || 0) : 1;
  var kaTopH = ""; var kaMoreH = "";
  for (var i = 0; i < kunden.length; i++) {
    var kRow  = kunden[i];
    var kName = kundeLabel(kRow.Kunde || kRow.kunde || "");
    var kWert = +kRow.Wert || +kRow.wert || 0;
    var rh = rowHtml(kName, kWert, maxKa, gesamt);
    if (i < KA_FIXED) { kaTopH += rh; } else { kaMoreH += rh; }
  }
  var kaTopEl = document.getElementById("ka-top");
  var kaMoreEl = document.getElementById("ka-more");
  kaTopEl.innerHTML  = kaTopH  || "<div style=\"padding:14px 18px;color:#6b7280;font-size:13px\">Keine Kundendaten verf\u00fcgbar.</div>";
  kaMoreEl.innerHTML = kaMoreH;
  if (kaMoreH) { bindExpand("ka-xbtn", "ka-more", kunden.length, KA_FIXED); }

  // Artikelgruppen
  var agRaw = d.artikelgruppen || {};
  var agArr = [];
  var keys  = Object.keys(agRaw);
  for (var ai = 0; ai < keys.length; ai++) {
    var k = keys[ai];
    agArr.push({ label: (AG_LABELS[k] || k), wert: +agRaw[k] || 0 });
  }
  agArr.sort(function (a, b) { return b.wert - a.wert; });
  var AG_FIXED = 5;
  var maxAg = agArr.length > 0 ? agArr[0].wert : 1;
  var agTopH = ""; var agMoreH = "";
  for (var aj = 0; aj < agArr.length; aj++) {
    var agR = agArr[aj];
    var rh2 = rowHtml(agR.label, agR.wert, maxAg, gesamt);
    if (aj < AG_FIXED) { agTopH += rh2; } else { agMoreH += rh2; }
  }
  var agTopEl = document.getElementById("ag-top");
  var agMoreEl = document.getElementById("ag-more");
  agTopEl.innerHTML  = agTopH  || "<div style=\"padding:14px 18px;color:#6b7280;font-size:13px\">Keine Gruppenddaten verf\u00fcgbar.</div>";
  agMoreEl.innerHTML = agMoreH;
  if (agMoreH) { bindExpand("ag-xbtn", "ag-more", agArr.length, AG_FIXED); }

  // Plausi-Badges
  var plausiBar = document.getElementById("plausi-bar");
  var pl = d.plausi || {};
  function badge(ok, label, diff) {
    var cls  = ok ? "ok" : "err";
    var sym  = ok ? "\u2713" : "\u2717";
    var dStr = (diff != null && +diff > 0) ? " (\u00b1" + (+diff).toFixed(4) + " \u20ac)" : "";
    return "<span class=\"plausi-badge " + cls + "\">" +
      "<span class=\"plausi-dot\"></span>" + sym + " " + esc(label) + dStr +
    "</span>";
  }
  var pHtml = "";
  var grpOk   = (pl.gruppen_ok != null) ? !!pl.gruppen_ok : !!d.check_ok;
  var grpDiff = (pl.diff_gruppen != null) ? pl.diff_gruppen : d.check_diff;
  pHtml += badge(grpOk, "Artikelgruppen-Summe", grpDiff);
  if (pl.kunden_ok != null) {
    pHtml += badge(!!pl.kunden_ok, "Kunden-Summe", pl.diff_kunden);
  }
  plausiBar.innerHTML = pHtml;

  // Timestamp
  var tsBar = document.getElementById("ts-bar");
  if (d.timestamp) {
    try {
      tsBar.textContent = "Datenstand: " + new Date(d.timestamp).toLocaleString("de-DE");
    } catch (e) { tsBar.textContent = "Datenstand: " + d.timestamp; }
  }
}

fetch("_data/auftragsbestand.json?t=" + Date.now())
  .then(function (r) {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(function (data) {
    document.getElementById("root-loading").style.display = "none";
    document.getElementById("root-data").style.display    = "";
    render(data);
    bindCollapse("wh-ka", "chev-ka", "wb-ka");
    bindCollapse("wh-ag", "chev-ag", "wb-ag");
  })
  .catch(function (err) {
    document.getElementById("root-loading").style.display = "none";
    document.getElementById("root-error").style.display   = "";
    console.error("Dashboard-Fehler:", err);
  });

}());
</script>
</body>
</html>
