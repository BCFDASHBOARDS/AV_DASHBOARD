<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAG — BCF Dashboard</title>
<style>

:root {
  --bg:#f5f6f8; --surface:#ffffff; --border:#e1e4e8; --text:#1a1e27;
  --text-sec:#6b7280; --accent:#1c5fa6; --green:#16a34a; --red:#dc2626;
  --bar-bg:#e8edf5; --bar-fill:#3b82f6; --bar-anker:#f59e0b;
  --shadow:0 1px 4px rgba(0,0,0,.08); --r:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  padding:0 0 48px;-webkit-font-smoothing:antialiased;}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  position:sticky;top:0;z-index:10;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-bar a{display:inline-block;padding:14px 20px 12px;font-size:13px;font-weight:500;
  color:var(--text-sec);text-decoration:none;border-bottom:2px solid transparent;
  white-space:nowrap;transition:color .15s,border-color .15s;}
.tab-bar a:hover{color:var(--text);}
.tab-bar a.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.page-content{padding:20px 24px 0;max-width:900px;}
.kpi-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:16px 20px;flex:1 1 160px;min-width:140px;}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-sec);margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1;}
.kpi-unit{font-size:12px;font-weight:400;color:var(--text-sec);margin-left:3px;}
.kpi-sub{font-size:11px;color:var(--text-sec);margin-top:4px;}
.widget-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.widget-header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;user-select:none;
  border-bottom:1px solid var(--border);transition:background .12s;}
.widget-header:hover{background:#f8fafc;}
.widget-title{font-size:13px;font-weight:700;letter-spacing:-.1px;}
.widget-chevron{font-size:10px;color:var(--text-sec);transition:transform .2s;display:inline-block;}
.widget-chevron.collapsed{transform:rotate(-90deg);}
.ag-row-item{padding:9px 18px;border-bottom:1px solid #f1f3f6;cursor:pointer;transition:background .12s;}
.ag-row-item:last-child{border-bottom:none;}
.ag-row-item:hover{background:#f8fafc;}
.ag-row-item.anker{background:#fffbeb;}
.ag-row-item.anker:hover{background:#fef3c7;}
.ag-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ag-row-label{display:flex;align-items:center;gap:8px;}
.ag-row-name{font-size:13px;font-weight:600;color:var(--text);}
.ag-row-name.anker{color:#92400e;font-style:italic;}
.ag-row-chev{font-size:9px;color:var(--text-sec);transition:transform .2s;display:inline-block;}
.ag-row-chev.open{transform:rotate(90deg);}
.ag-row-right{display:flex;align-items:center;gap:10px;}
.ag-row-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.ag-row-share{font-size:11px;color:var(--text-sec);min-width:40px;text-align:right;}
.row-bar{height:4px;background:var(--bar-bg);border-radius:2px;overflow:hidden;}
.row-bar-fill{height:100%;background:var(--bar-fill);border-radius:2px;}
.row-bar-fill.anker{background:var(--bar-anker);}
.ag-detail-panel{background:#f8fafc;border-top:1px solid var(--border);
  padding:10px 18px 14px;display:none;}
.ag-detail-panel.open{display:block;}
.ag-art-row{display:flex;align-items:center;justify-content:space-between;
  padding:5px 0;border-bottom:1px solid #edf0f4;}
.ag-art-row:last-child{border-bottom:none;}
.ag-art-row.hidden{display:none;}
.ag-art-info{flex:1;min-width:0;}
.ag-art-text{font-size:12px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-art-nr{font-size:11px;color:var(--text-sec);margin-top:1px;font-family:monospace;}
.ag-art-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ag-art-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;}
.ag-art-share{font-size:11px;color:var(--text-sec);min-width:36px;text-align:right;}
.expand-wrap{padding:8px 18px 12px;}
.expand-btn{display:block;width:100%;background:none;border:1px solid var(--border);
  border-radius:6px;padding:7px;font-size:12px;font-weight:600;color:var(--accent);
  cursor:pointer;text-align:center;transition:background .12s,border-color .12s;}
.expand-btn:hover{background:#eff6ff;border-color:var(--accent);}
.ts-bar{font-size:11px;color:var(--text-sec);padding-top:4px;}
.state-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:40px 32px;text-align:center;margin-bottom:14px;
  color:var(--text-sec);font-size:13px;}
.notice-bar{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r);
  padding:10px 16px;margin-bottom:14px;font-size:12px;color:#92400e;
  display:flex;align-items:center;gap:8px;}
.notice-bar b{font-weight:700;}
@media(max-width:599px){
  .page-content{padding:12px 12px 0;}.tab-bar{padding:0 12px;}
  .tab-bar a{padding:12px 14px 10px;}.kpi-value{font-size:18px;}
  .kpi-card{padding:12px 14px;}.widget-header{padding:12px 14px;}
  .ag-row-item{padding:8px 14px;}.expand-wrap{padding:6px 14px 10px;}
}
@media(min-width:600px) and (max-width:1023px){.page-content{padding:16px 16px 0;}.kpi-value{font-size:20px;}}
@media(min-width:1024px){.page-content{padding:24px 32px 0;}}

</style>
</head>
<body>

<nav class="tab-bar">
  <a href="material.html">Material</a>
  <a href="presserei.html">Presserei</a>
  <a href="pressenbelegung.html">Pressenbelegung</a>
  <a href="mag.html" class="active">MAG</a>
</nav>

<div class="page-content">
  <div id="notice-bar" class="notice-bar" style="display:none">
    <span>&#9888;</span><span id="notice-text"></span>
  </div>

  <div id="root-loading" class="state-card">Daten werden geladen&hellip;</div>

  <div id="root-data" style="display:none">
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Gesamt zu magazinieren</div>
        <div class="kpi-value" id="kv-gesamt">&mdash;<span class="kpi-unit">&#8240;</span></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Nur Ankern&auml;gel</div>
        <div class="kpi-value" id="kv-anker">&mdash;<span class="kpi-unit">&#8240;</span></div>
        <div class="kpi-sub">in Gruppen enthalten</div>
      </div>
    </div>

    <div class="widget-card">
      <div class="widget-header" id="wh-ag">
        <span class="widget-title">Produktgruppen</span>
        <span class="widget-chevron" id="chev-ag">&#9660;</span>
      </div>
      <div id="wb-ag">
        <div id="ag-rows"></div>
      </div>
    </div>

    <div class="ts-bar" id="ts-bar"></div>
  </div>
</div>

<script>

(function () {
"use strict";

var AG_LABELS = {
  "CDF_UTC":           "CDF & UTC",
  "Papertape":         "Papertape",
  "Drahtcoil":         "Drahtcoil",
  "Streifennaegel_KS": "Streifennägel P1 + P3 + P4",
  "BSN":               "Betonstifte",
  "KRL":               "K-Rolle"
};
var ANKER_LABEL = "Nur Ankernägel";
var TOP_N = 5;

function fmtNum(v) {
  if (v == null || isNaN(+v)) return "—";
  return Math.round(+v).toLocaleString("de-DE");
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function showNotice(msg) {
  var nb = document.getElementById("notice-bar");
  var nt = document.getElementById("notice-text");
  if (nb && nt) { nt.innerHTML = msg; nb.style.display = ""; }
}
function showStructure() {
  document.getElementById("root-loading").style.display = "none";
  document.getElementById("root-data").style.display    = "";
  bindCollapse("wh-ag","chev-ag","wb-ag");
}
function bindCollapse(hId, cId, bId) {
  var hdr  = document.getElementById(hId);
  var chev = document.getElementById(cId);
  var body = document.getElementById(bId);
  if (!hdr) return;
  hdr.addEventListener("click", function () {
    var open = body.style.display !== "none";
    body.style.display = open ? "none" : "";
    chev.classList.toggle("collapsed", open);
  });
}

function buildDetailHtml(arts, panelId, groupTotal) {
  if (!arts || !arts.length) return "";
  var total = arts.length;
  var h = "";
  for (var i = 0; i < arts.length; i++) {
    var hidden = i >= TOP_N ? ' hidden' : '';
    var share = groupTotal > 0 ? (arts[i].menge / groupTotal * 100).toFixed(1) : "0.0";
    var kt = arts[i].kurztext || arts[i].artnr;
    h += '<div class="ag-art-row' + hidden + '">'
       + '<div class="ag-art-info">'
       + '<div class="ag-art-text">' + esc(kt) + '</div>'
       + '<div class="ag-art-nr">'  + esc(arts[i].artnr) + '</div>'
       + '</div>'
       + '<div class="ag-art-right">'
       + '<span class="ag-art-val">' + fmtNum(arts[i].menge) + '</span>'
       + '<span class="ag-art-share">' + share + '&thinsp;%</span>'
       + '</div></div>';
  }
  if (total > TOP_N) {
    var rest = total - TOP_N;
    h += '<div class="expand-wrap" id="ew-' + panelId + '">'
       + '<button class="expand-btn" onclick="toggleAll(\'' + panelId + '\',' + rest + ')">'
       + '&#9660;&nbsp;Alle anzeigen (' + rest + ' weitere)</button></div>';
  }
  return h;
}

window.toggleAll = function(panelId, rest) {
  var panel = document.getElementById(panelId);
  if (!panel) return;
  var rows = panel.querySelectorAll(".ag-art-row.hidden");
  var ewDiv = document.getElementById("ew-" + panelId);
  var btn = ewDiv ? ewDiv.querySelector("button") : null;
  if (rows.length > 0) {
    for (var i = 0; i < rows.length; i++) rows[i].classList.remove("hidden");
    if (btn) btn.innerHTML = "&#9650;&nbsp;Weniger anzeigen";
  } else {
    var allRows = panel.querySelectorAll(".ag-art-row");
    for (var j = TOP_N; j < allRows.length; j++) allRows[j].classList.add("hidden");
    if (btn) btn.innerHTML = "&#9660;&nbsp;Alle anzeigen (" + rest + " weitere)";
  }
};

function bindRowToggle(itemId, panelId, chevId) {
  var item  = document.getElementById(itemId);
  var panel = document.getElementById(panelId);
  var chev  = document.getElementById(chevId);
  if (!item || !panel) return;
  item.addEventListener("click", function() {
    var open = panel.classList.contains("open");
    panel.classList.toggle("open", !open);
    if (chev) chev.classList.toggle("open", !open);
  });
}

function render(d) {
  var gesamt = +d.gesamt || 0;
  var anker  = +d.davon_ankernaegel || 0;

  document.getElementById("kv-gesamt").innerHTML =
    fmtNum(gesamt) + '<span class="kpi-unit">&#8240;</span>';
  document.getElementById("kv-anker").innerHTML =
    fmtNum(anker) + '<span class="kpi-unit">&#8240;</span>';

  var agRaw    = d.gruppen        || {};
  var agDetail = d.gruppen_detail || {};
  var ankerDet = d.ankernaegel_detail || {};

  var agArr = [];
  for (var k in agRaw) {
    if (AG_LABELS[k]) agArr.push({ key:k, label:AG_LABELS[k], menge:+agRaw[k]||0 });
  }
  agArr.sort(function(a,b){ return b.menge - a.menge; });

  var maxMenge = agArr.length > 0 ? agArr[0].menge : 1;
  var html = "";
  var binds = [];
  var idx = 0;

  for (var i = 0; i < agArr.length; i++, idx++) {
    var ag      = agArr[i];
    var pct     = maxMenge > 0 ? Math.round(ag.menge / maxMenge * 100) : 0;
    var share   = gesamt > 0 ? (ag.menge / gesamt * 100).toFixed(1) : "0.0";
    var det     = agDetail[ag.key] || {};
    var arts    = det.artikel || [];
    var iid     = "ag-item-"  + idx;
    var pid     = "ag-panel-" + idx;
    var cid     = "ag-chev-"  + idx;
    var hasArts = arts.length > 0;

    html += '<div class="ag-row-item" id="' + iid + '">'
          + '<div class="ag-row-top">'
          + '<div class="ag-row-label">'
          + (hasArts ? '<span class="ag-row-chev" id="' + cid + '">&#9658;</span>' : '')
          + '<span class="ag-row-name">' + esc(ag.label) + '</span>'
          + '</div>'
          + '<div class="ag-row-right">'
          + '<span class="ag-row-val">' + fmtNum(ag.menge) + '&thinsp;&#8240;</span>'
          + '<span class="ag-row-share">' + share + '&thinsp;%</span>'
          + '</div></div>'
          + '<div class="row-bar"><div class="row-bar-fill" style="width:' + pct + '%"></div></div>'
          + '</div>';

    if (hasArts) {
      html += '<div class="ag-detail-panel" id="' + pid + '">'
            + buildDetailHtml(arts, pid, ag.menge)
            + '</div>';
      binds.push([iid, pid, cid]);
    }
  }

  /* Ankernägel Sonderzeile */
  if (anker > 0) {
    idx++;
    var aPct   = maxMenge > 0 ? Math.round(anker / maxMenge * 100) : 0;
    var aShare = gesamt > 0 ? (anker / gesamt * 100).toFixed(1) : "0.0";
    var aArts  = ankerDet.artikel || [];
    var aiid   = "ag-item-"  + idx;
    var apid   = "ag-panel-" + idx;
    var acid   = "ag-chev-"  + idx;
    var aHas   = aArts.length > 0;

    html += '<div class="ag-row-item anker" id="' + aiid + '">'
          + '<div class="ag-row-top">'
          + '<div class="ag-row-label">'
          + (aHas ? '<span class="ag-row-chev" id="' + acid + '">&#9658;</span>' : '')
          + '<span class="ag-row-name anker">' + esc(ANKER_LABEL) + '</span>'
          + '</div>'
          + '<div class="ag-row-right">'
          + '<span class="ag-row-val">' + fmtNum(anker) + '&thinsp;&#8240;</span>'
          + '<span class="ag-row-share">' + aShare + '&thinsp;%</span>'
          + '</div></div>'
          + '<div class="row-bar"><div class="row-bar-fill anker" style="width:' + aPct + '%"></div></div>'
          + '</div>';

    if (aHas) {
      html += '<div class="ag-detail-panel" id="' + apid + '">'
            + buildDetailHtml(aArts, apid, anker)
            + '</div>';
      binds.push([aiid, apid, acid]);
    }
  }

  document.getElementById("ag-rows").innerHTML = html;
  for (var bi = 0; bi < binds.length; bi++) {
    bindRowToggle(binds[bi][0], binds[bi][1], binds[bi][2]);
  }

  if (d.timestamp) {
    try {
      document.getElementById("ts-bar").textContent =
        "Datenstand: " + new Date(d.timestamp).toLocaleString("de-DE");
    } catch(e) {}
  }
}

var EMPTY = { gesamt:null, gruppen:{}, davon_ankernaegel:null,
              ankernaegel_detail:{}, gruppen_detail:{}, timestamp:null };

fetch("../_data/magazinierung.json?t=" + Date.now())
  .then(function(r) {
    if (r.status === 404) return { _kein_datenstand: true };
    if (!r.ok) return { _error: "HTTP " + r.status };
    return r.text().then(function(txt) {
      if (txt.charCodeAt(0) === 0xFEFF) txt = txt.slice(1);
      try { return JSON.parse(txt); }
      catch(e) { return { _error: "JSON: " + e.message }; }
    });
  })
  .then(function(data) {
    if (data._kein_datenstand) {
      showStructure();
      showNotice("<b>Noch kein Datenstand</b> — bitte run_all.ps1 ausführen.");
      render(EMPTY); return;
    }
    if (data._error) {
      showStructure();
      showNotice("<b>Ladefehler:</b> " + esc(data._error));
      render(EMPTY); return;
    }
    showStructure();
    render(data);
  })
  .catch(function(err) {
    showStructure();
    showNotice("<b>Netzwerkfehler:</b> " + esc(String(err)));
    render(EMPTY);
    console.error("MAG-Fehler:", err);
  });

}());

</script>

</body>
</html>
