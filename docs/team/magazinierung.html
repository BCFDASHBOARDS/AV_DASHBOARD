<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAG &mdash; BCF Dashboard</title>
<style>

:root {
  --bg:#f5f6f8; --surface:#ffffff; --border:#e1e4e8;
  --text:#1a1e27; --text-sec:#6b7280; --accent:#1c5fa6;
  --bar-bg:#e8edf5; --bar-fill:#3b82f6; --bar-anker:#f59e0b;
  --shadow:0 1px 4px rgba(0,0,0,.08); --r:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  padding:0 0 48px;-webkit-font-smoothing:antialiased;}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  position:sticky;top:0;z-index:10;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-bar a{display:inline-block;padding:14px 20px 12px;font-size:13px;font-weight:500;
  color:var(--text-sec);text-decoration:none;border-bottom:2px solid transparent;
  white-space:nowrap;transition:color .15s,border-color .15s;}
.tab-bar a:hover{color:var(--text);}
.tab-bar a.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.page-content{padding:20px 24px 0;max-width:700px;}
.kpi-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:16px 20px;flex:1 1 160px;min-width:140px;}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-sec);margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1;}
.kpi-unit{font-size:12px;font-weight:400;color:var(--text-sec);margin-left:3px;}
.kpi-sub{font-size:11px;color:var(--text-sec);margin-top:4px;}
.widget-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.widget-header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.widget-title{font-size:13px;font-weight:700;}
.wh-chev{font-size:11px;color:var(--text-sec);transition:transform .2s;}
.wh-chev.collapsed{transform:rotate(-90deg);}
.ag-table{width:100%;border-collapse:collapse;font-size:12px;}
.ag-table th{padding:8px 18px;text-align:left;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.4px;color:var(--text-sec);
  border-bottom:1px solid var(--border);background:#f9fafb;}
.ag-table th.r{text-align:right;}
.ag-row td{padding:9px 18px;border-bottom:1px solid #f1f3f6;vertical-align:middle;}
.ag-clickable{cursor:pointer;}
.ag-clickable:hover td{background:#f8fafc;}
.ag-name{font-weight:500;}
.ag-chev{font-size:9px;color:var(--text-sec);transition:transform .2s;
  display:inline-block;margin-right:5px;}
.ag-chev.open{transform:rotate(90deg);}
.ag-val{font-variant-numeric:tabular-nums;white-space:nowrap;}
.ag-pct{color:var(--text-sec);text-align:right;white-space:nowrap;}
.bar-wrap{height:4px;background:var(--bar-bg);border-radius:2px;overflow:hidden;margin-top:4px;min-width:60px;}
.bar-fill{height:100%;background:var(--bar-fill);border-radius:2px;}
.bar-fill.anker{background:var(--bar-anker);}
.anker-row td{background:#fffbeb !important;border-top:1px dashed #fde68a;}
.anker-row .ag-name{color:#92400e;font-style:italic;}
.ag-detail-row td{padding:0;border-bottom:1px solid #f1f3f6;}
.ag-detail-panel{display:none;padding:10px 18px 12px 36px;background:#f9fafb;}
.ag-detail-panel.open{display:block;}
.det-table{width:100%;border-collapse:collapse;font-size:11px;}
.det-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;
  color:var(--text-sec);padding:4px 6px;border-bottom:1px solid var(--border);text-align:left;}
.det-table td{padding:4px 6px;border-bottom:1px solid #eef0f3;}
.det-table tr:last-child td{border-bottom:none;}
.det-artnr{font-family:monospace;color:var(--text-sec);font-size:10px;}
.det-val{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
.state-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:40px 32px;text-align:center;
  margin-bottom:14px;color:var(--text-sec);font-size:13px;}
.notice-bar{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r);
  padding:10px 16px;margin-bottom:14px;font-size:12px;color:#92400e;
  display:flex;align-items:center;gap:8px;}
.ts-bar{font-size:11px;color:var(--text-sec);padding-top:4px;}
@media(max-width:599px){
  .page-content{padding:12px 12px 0;}.tab-bar{padding:0 12px;}
  .tab-bar a{padding:12px 14px 10px;}
  .kpi-card{padding:12px 14px;}
  .ag-row td{padding:8px 12px;}
}
@media(min-width:1024px){.page-content{padding:24px 32px 0;}}

</style>
</head>
<body>

<nav class="tab-bar">
  <a href="material.html">Material</a>
  <a href="presserei.html">Presserei</a>
  <a href="pressenbelegung.html">Pressenbelegung</a>
  <a href="magazinierung.html" class="active">MAG</a>
</nav>

<div class="page-content">
  <div id="notice-bar" class="notice-bar" style="display:none">
    <span>&#9888;</span><span id="notice-text"></span>
  </div>

  <div id="root-loading" class="state-card">Daten werden geladen&hellip;</div>

  <div id="root-data" style="display:none">
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Gesamt zu produzieren</div>
        <div class="kpi-value" id="kv-gesamt">&mdash;<span class="kpi-unit">Stk.</span></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">davon Ankern&auml;gel</div>
        <div class="kpi-value" id="kv-anker">&mdash;<span class="kpi-unit">Stk.</span></div>
        <div class="kpi-sub">in Gruppen enthalten</div>
      </div>
    </div>

    <div class="widget-card">
      <div class="widget-header" id="wh-ag">
        <span class="widget-title">Produktgruppen</span>
        <span class="wh-chev" id="chev-ag">&#9660;</span>
      </div>
      <div id="wb-ag">
        <table class="ag-table">
          <thead><tr><th>Gruppe</th><th>Menge (Stk.)</th><th class="r">Anteil</th></tr></thead>
          <tbody id="ag-rows"></tbody>
        </table>
      </div>
    </div>

    <div class="ts-bar" id="ts-bar"></div>
  </div>
</div>

<script>

(function () {
"use strict";

var AG_LABELS = {
  "CDF_UTC":           "CDF & UTC",
  "Papertape":         "Papertape",
  "Drahtcoil":         "Drahtcoil",
  "Streifennaegel_KS": "Streifennägel KS",
  "BSN":               "55-BSN",
  "KRL":               "60-KRL"
};
var ANKER_KEY = "Ankernaegel";
var ANKER_LABEL = "Ankernägel (davon)";

function fmtNum(v) {
  if (v == null || isNaN(+v)) return "—";
  return Math.round(+v).toLocaleString("de-DE");
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function showNotice(msg) {
  var nb = document.getElementById("notice-bar");
  var nt = document.getElementById("notice-text");
  if (nb && nt) { nt.innerHTML = msg; nb.style.display = ""; }
}
function showStructure() {
  document.getElementById("root-loading").style.display = "none";
  document.getElementById("root-data").style.display    = "";
  bindCollapse("wh-ag","chev-ag","wb-ag");
}
function bindCollapse(hId, cId, bId) {
  var hdr  = document.getElementById(hId);
  var chev = document.getElementById(cId);
  var body = document.getElementById(bId);
  if (!hdr) return;
  hdr.addEventListener("click", function () {
    var open = body.style.display !== "none";
    body.style.display = open ? "none" : "";
    chev.classList.toggle("collapsed", open);
  });
}
function bindAgToggle(idx) {
  var row   = document.getElementById("ag-row-"    + idx);
  var panel = document.getElementById("ag-panel-"  + idx);
  var chev  = document.getElementById("ag-chev-"   + idx);
  if (!row || !panel) return;
  row.addEventListener("click", function () {
    var open = panel.classList.contains("open");
    panel.classList.toggle("open", !open);
    if (chev) chev.classList.toggle("open", !open);
  });
}

function buildDetailHtml(arts) {
  if (!arts || !arts.length) return "";
  var h = '<table class="det-table"><thead><tr><th>Artikel</th><th class="r">Menge (Stk.)</th></tr></thead><tbody>';
  for (var i = 0; i < arts.length; i++) {
    h += '<tr><td class="det-artnr">' + esc(arts[i].artnr) +
         '</td><td class="det-val r">' + fmtNum(arts[i].menge) + '</td></tr>';
  }
  return h + '</tbody></table>';
}

function render(d) {
  var gesamt = +d.gesamt || 0;
  var anker  = +d.davon_ankernaegel || 0;

  document.getElementById("kv-gesamt").innerHTML =
    fmtNum(gesamt) + '<span class="kpi-unit">Stk.</span>';
  document.getElementById("kv-anker").innerHTML =
    fmtNum(anker) + '<span class="kpi-unit">Stk.</span>';

  var agRaw    = d.gruppen        || {};
  var agDetail = d.gruppen_detail || {};
  var ankerDet = d.ankernaegel_detail || {};

  /* Sort main groups by value */
  var agArr = [];
  for (var k in agRaw) {
    if (AG_LABELS[k]) agArr.push({ key:k, label:AG_LABELS[k], menge:+agRaw[k]||0 });
  }
  agArr.sort(function(a,b){ return b.menge - a.menge; });

  var maxMenge = agArr.length > 0 ? agArr[0].menge : 1;
  var html = "";
  var toggleIdxs = [];
  var idx = 0;

  /* Main group rows */
  for (var i = 0; i < agArr.length; i++, idx++) {
    var ag   = agArr[i];
    var pct  = maxMenge > 0 ? Math.round(ag.menge / maxMenge * 100) : 0;
    var share = gesamt > 0 ? (ag.menge / gesamt * 100).toFixed(1) : "0.0";
    var det  = agDetail[ag.key] || {};
    var arts = det.top_artikel  || [];

    var chevHtml = arts.length
      ? '<span class="ag-chev" id="ag-chev-' + idx + '">&#9658;</span>' : '';

    html += '<tr class="ag-row' + (arts.length ? " ag-clickable" : "") +
            '" id="ag-row-' + idx + '">' +
      '<td class="ag-name">' + chevHtml + esc(ag.label) + '</td>' +
      '<td class="ag-val">' + fmtNum(ag.menge) +
        '<div class="bar-wrap"><div class="bar-fill" style="width:' + pct + '%"></div></div></td>' +
      '<td class="ag-pct">' + share + '&thinsp;%</td>' +
    '</tr>';

    if (arts.length) {
      html += '<tr class="ag-detail-row"><td colspan="3">' +
              '<div class="ag-detail-panel" id="ag-panel-' + idx + '">' +
              buildDetailHtml(arts) + '</div></td></tr>';
      toggleIdxs.push(idx);
    }
  }

  /* Ankernagel special row (davon — amber, dashed top border) */
  if (anker > 0) {
    idx++;
    var ankerPct  = maxMenge > 0 ? Math.round(anker / maxMenge * 100) : 0;
    var ankerArts = ankerDet.top_artikel || [];
    var ankerChev = ankerArts.length
      ? '<span class="ag-chev" id="ag-chev-' + idx + '">&#9658;</span>' : '';
    html += '<tr class="ag-row anker-row' + (ankerArts.length ? " ag-clickable" : "") +
            '" id="ag-row-' + idx + '">' +
      '<td class="ag-name">' + ankerChev + esc(ANKER_LABEL) + '</td>' +
      '<td class="ag-val">' + fmtNum(anker) +
        '<div class="bar-wrap"><div class="bar-fill anker" style="width:' + ankerPct + '%"></div></div></td>' +
      '<td class="ag-pct">' + (gesamt > 0 ? (anker/gesamt*100).toFixed(1) : "0.0") + '&thinsp;%</td>' +
    '</tr>';
    if (ankerArts.length) {
      html += '<tr class="ag-detail-row"><td colspan="3">' +
              '<div class="ag-detail-panel" id="ag-panel-' + idx + '">' +
              buildDetailHtml(ankerArts) + '</div></td></tr>';
      toggleIdxs.push(idx);
    }
  }

  if (!html) html = '<tr><td colspan="3" style="text-align:center;padding:24px;color:#6b7280">Keine Daten</td></tr>';
  document.getElementById("ag-rows").innerHTML = html;
  for (var ti = 0; ti < toggleIdxs.length; ti++) bindAgToggle(toggleIdxs[ti]);

  if (d.timestamp) {
    try {
      document.getElementById("ts-bar").textContent =
        "Datenstand: " + new Date(d.timestamp).toLocaleString("de-DE");
    } catch(e) {}
  }
}

var EMPTY = { gesamt:null, gruppen:{}, davon_ankernaegel:null,
              ankernaegel_detail:{}, gruppen_detail:{}, timestamp:null };

fetch("../_data/magazinierung.json?t=" + Date.now())
  .then(function(r) {
    if (r.status === 404) return { _kein_datenstand: true };
    if (!r.ok) return { _error: "HTTP " + r.status };
    return r.text().then(function(txt) {
      if (txt.charCodeAt(0) === 0xFEFF) txt = txt.slice(1);
      try { return JSON.parse(txt); }
      catch(e) { return { _error: "JSON: " + e.message }; }
    });
  })
  .then(function(data) {
    if (data._kein_datenstand) {
      showStructure();
      showNotice("<b>Noch kein Datenstand</b> — bitte run_all.ps1 ausführen.");
      render(EMPTY); return;
    }
    if (data._error) {
      showStructure();
      showNotice("<b>Ladefehler:</b> " + esc(data._error));
      render(EMPTY); return;
    }
    showStructure();
    render(data);
  })
  .catch(function(err) {
    showStructure();
    showNotice("<b>Netzwerkfehler:</b> " + esc(String(err)));
    render(EMPTY);
    console.error("MAG-Fehler:", err);
  });

}());

</script>

</body>
</html>
