<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presserei &mdash; BCF Dashboard</title>
<style>
:root {
  --bg:#f5f6f8; --surface:#ffffff; --border:#e1e4e8;
  --text:#1a1e27; --text-sec:#6b7280; --accent:#1c5fa6;
  --shadow:0 1px 4px rgba(0,0,0,.08); --r:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  padding:0 0 40px;-webkit-font-smoothing:antialiased;}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  position:sticky;top:0;z-index:10;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-bar a{display:inline-block;padding:14px 20px 12px;font-size:13px;font-weight:500;
  color:var(--text-sec);text-decoration:none;border-bottom:2px solid transparent;
  white-space:nowrap;transition:color .15s,border-color .15s;}
.tab-bar a:hover{color:var(--text);}
.tab-bar a.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.page-content{padding:20px 24px 0;}
.page-header{margin-bottom:20px;}
.page-header h1{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.page-header .sub{font-size:12px;color:var(--text-sec);margin-top:3px;}
.placeholder-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);padding:48px 32px;text-align:center;}
.placeholder-icon{font-size:40px;margin-bottom:16px;opacity:.35;}
.placeholder-card h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;}
.placeholder-card p{font-size:13px;color:var(--text-sec);max-width:360px;
  margin:0 auto;line-height:1.6;}
@media(max-width:599px){
  .page-content{padding:12px 12px 0;}.tab-bar{padding:0 12px;}
  .tab-bar a{padding:12px 14px 10px;}
}
</style>
</head>
<body>

<nav class="tab-bar">
  <a href="material.html">Material</a>
  <a href="presserei.html" class="active">Presserei</a>
  <a href="pressenbelegung.html">Pressenbelegung</a>
  <a href="mag.html">MAG</a>
</nav>

<div class="page-content">
  <div class="page-header">
    <h1>Presserei</h1>
    <div class="sub">BCF Dashboard &middot; Daten noch nicht konfiguriert</div>
  </div>
  <div class="placeholder-card">
    <div class="placeholder-icon">&#9874;</div>
    <h2>Noch keine Daten verf&uuml;gbar</h2>
    <p>Diese Ansicht wird konfiguriert sobald die Datenstruktur f&uuml;r die Presserei definiert ist.</p>
  </div>
</div>

</body>
</html>
