<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material &mdash; BCF Dashboard</title>
<style>
:root {
  --bg:#f5f6f8; --surface:#ffffff; --border:#e1e4e8; --text:#1a1e27;
  --text-sec:#6b7280; --accent:#1c5fa6; --green:#16a34a; --red:#dc2626;
  --bar-bg:#e8edf5; --bar-fill:#3b82f6;
  --shadow:0 1px 4px rgba(0,0,0,.08); --r:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  padding:0 0 48px;-webkit-font-smoothing:antialiased;}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  position:sticky;top:0;z-index:10;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-bar a{display:inline-block;padding:14px 20px 12px;font-size:13px;font-weight:500;
  color:var(--text-sec);text-decoration:none;border-bottom:2px solid transparent;
  white-space:nowrap;transition:color .15s,border-color .15s;}
.tab-bar a:hover{color:var(--text);}
.tab-bar a.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.page-content{padding:20px 24px 0;max-width:900px;}
.kpi-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:16px 20px;flex:1 1 160px;min-width:140px;}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-sec);margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1;}
.kpi-sub{font-size:11px;color:var(--text-sec);margin-top:4px;}
.widget-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
/* Machine header */
.mach-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;user-select:none;
  border-bottom:1px solid var(--border);transition:background .12s;}
.mach-hdr:hover{background:#f8fafc;}
.mach-title{font-size:13px;font-weight:700;letter-spacing:-.1px;margin-bottom:3px;}
.mach-sub{font-size:11px;color:var(--text-sec);}
.mach-sub b{font-weight:700;color:var(--text);}
.mach-chev{font-size:10px;color:var(--text-sec);transition:transform .2s;
  display:inline-block;flex-shrink:0;margin-left:12px;}
.mach-chev.collapsed{transform:rotate(-90deg);}
/* Material group rows */
.mat-grp{border-bottom:1px solid #f1f3f6;cursor:pointer;transition:background .12s;}
.mat-grp:last-child{border-bottom:none;}
.mat-grp:hover{background:#f8fafc;}
.mat-grp-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;}
.mat-grp-name{font-size:12px;font-weight:700;color:var(--text);}
.mat-grp-stats{font-size:11px;color:var(--text-sec);margin-top:2px;}
.mat-grp-stats b{font-weight:700;color:var(--text);}
.mat-grp-chev{font-size:9px;color:var(--text-sec);transition:transform .2s;
  display:inline-block;flex-shrink:0;margin-left:10px;}
.mat-grp-chev.open{transform:rotate(90deg);}
/* Article panel */
.art-panel{background:#f8fafc;border-top:1px solid var(--border);
  padding:0;display:none;overflow-x:auto;}
.art-panel.open{display:block;}
.art-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.art-tbl th{text-align:left;padding:7px 12px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;color:var(--text-sec);
  border-bottom:1px solid var(--border);white-space:nowrap;}
.art-tbl th.num{text-align:right;}
.art-tbl td{padding:6px 12px;border-bottom:1px solid #edf0f4;vertical-align:middle;}
.art-tbl tr:last-child td{border-bottom:none;}
.art-tbl td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
.art-tbl .art-nr{font-weight:700;color:var(--accent);white-space:nowrap;}
.art-tbl .art-text{color:var(--text);max-width:260px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* Section divider between machines */
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-sec);padding:12px 0 6px;}
/* Utility */
.state-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow);padding:40px 32px;text-align:center;margin-bottom:14px;
  color:var(--text-sec);font-size:13px;}
.ts-bar{font-size:11px;color:var(--text-sec);padding-top:4px;}
.notice-bar{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r);
  padding:10px 16px;margin-bottom:14px;font-size:12px;color:#92400e;
  display:flex;align-items:center;gap:8px;}
@media(max-width:599px){
  .page-content{padding:12px 12px 0;}.tab-bar{padding:0 12px;}
  .tab-bar a{padding:12px 14px 10px;}.kpi-value{font-size:18px;}
  .kpi-card{padding:12px 14px;}.mach-hdr{padding:12px 14px;}
  .mat-grp-hdr{padding:9px 14px;}.art-tbl th,.art-tbl td{padding:5px 10px;}
}
@media(min-width:600px) and (max-width:1023px){.page-content{padding:16px 16px 0;}.kpi-value{font-size:20px;}}
@media(min-width:1024px){.page-content{padding:24px 32px 0;}}
</style>
</head>
<body>
<nav class="tab-bar">
  <a href="auftragsbestand.html">Auftragsbestand</a>
  <a href="presserei.html">Presserei</a>
  <a href="material.html" class="active">Material</a>
</nav>

<div class="page-content">
  <div id="root-loading" class="state-card">Daten werden geladen&hellip;</div>

  <div id="notice-bar" class="notice-bar" style="display:none">
    <span>&#9888;</span>
    <span id="notice-text"></span>
  </div>

  <div id="root-data" style="display:none">

    <!-- KPI Row 1 -->
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Gesamtlagerbestand</div>
        <div class="kpi-value" id="kv-bestand">&mdash;</div>
        <div class="kpi-sub">kg gesamt</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Verbrauch YTD</div>
        <div class="kpi-value" id="kv-ytd">&mdash;</div>
        <div class="kpi-sub">kg seit Jahresbeginn</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label" id="kl-vm">Vormonat</div>
        <div class="kpi-value" id="kv-vm">&mdash;</div>
        <div class="kpi-sub">kg Verbrauch</div>
      </div>
    </div>

    <!-- KPI Row 2: Maschinen -->
    <div class="kpi-row" id="kpi-mach-row"></div>

    <!-- KPI Row 3: Material -->
    <div class="kpi-row" id="kpi-mat-row"></div>

    <!-- Timestamp -->
    <div class="ts-bar" id="ts-bar"></div>

    <!-- Machine widgets -->
    <div id="mach-widgets" style="margin-top:14px;"></div>

  </div>
</div>

<script>

function fmtKg(v) {
  if (v == null || isNaN(v)) return '\u2014';
  return Math.round(v).toLocaleString('de-DE') + ' kg';
}
function fmtKgShort(v) {
  if (v == null || isNaN(v)) return '\u2014';
  var n = Math.round(v);
  if (n >= 1000000) return (n/1000000).toLocaleString('de-DE',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' Mio kg';
  if (n >= 1000)    return (n/1000).toLocaleString('de-DE',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' t';
  return n.toLocaleString('de-DE') + ' kg';
}

function showNotice(msg) {
  document.getElementById('notice-text').textContent = msg;
  document.getElementById('notice-bar').style.display = '';
}

function buildMachWidget(mach, idx) {
  var card = document.createElement('div');
  card.className = 'widget-card';

  // Machine header
  var hdr = document.createElement('div');
  hdr.className = 'mach-hdr';
  hdr.innerHTML =
    '<div>' +
      '<div class="mach-title">' + mach.label + '</div>' +
      '<div class="mach-sub">Bestand: <b>' + fmtKg(mach.bestand) + '</b>' +
        ' &bull; YTD: <b>' + fmtKg(mach.ytd) + '</b>' +
        ' &bull; Vormonat: <b>' + fmtKg(mach.vormonat) + '</b>' +
      '</div>' +
    '</div>' +
    '<span class="mach-chev" id="mchev-' + idx + '">&#9650;</span>';
  card.appendChild(hdr);

  // Machine body
  var body = document.createElement('div');
  body.id = 'mbody-' + idx;

  (mach.materialgruppen || []).forEach(function(mg, gi) {
    var grpId = idx + '-' + gi;

    var grpDiv = document.createElement('div');
    grpDiv.className = 'mat-grp';

    var grpHdr = document.createElement('div');
    grpHdr.className = 'mat-grp-hdr';
    grpHdr.innerHTML =
      '<div>' +
        '<div class="mat-grp-name">' + mg.label + '</div>' +
        '<div class="mat-grp-stats">Bestand: <b>' + fmtKg(mg.bestand) + '</b>' +
          ' &bull; YTD: <b>' + fmtKg(mg.ytd) + '</b>' +
          ' &bull; Vormonat: <b>' + fmtKg(mg.vormonat) + '</b>' +
        '</div>' +
      '</div>' +
      '<span class="mat-grp-chev" id="gchev-' + grpId + '">&#9658;</span>';

    var artPanel = document.createElement('div');
    artPanel.className = 'art-panel';
    artPanel.id = 'ap-' + grpId;

    // Article table
    var tbl = document.createElement('table');
    tbl.className = 'art-tbl';
    tbl.innerHTML =
      '<thead><tr>' +
        '<th>Art.-Nr.</th>' +
        '<th>Kurztext</th>' +
        '<th class="num">Bestand (kg)</th>' +
        '<th class="num">YTD (kg)</th>' +
        '<th class="num" id="vm-col-' + grpId + '">Vormonat (kg)</th>' +
      '</tr></thead>';
    var tbody = document.createElement('tbody');
    (mg.artikel || []).forEach(function(art) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="art-nr">' + art.artnr + '</td>' +
        '<td class="art-text" title="' + art.text + '">' + art.text + '</td>' +
        '<td class="num">' + Math.round(art.bestand).toLocaleString('de-DE') + '</td>' +
        '<td class="num">' + Math.round(art.ytd).toLocaleString('de-DE') + '</td>' +
        '<td class="num">' + Math.round(art.vormonat).toLocaleString('de-DE') + '</td>';
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    artPanel.appendChild(tbl);

    grpHdr.addEventListener('click', function() {
      var panel = document.getElementById('ap-' + grpId);
      var chev  = document.getElementById('gchev-' + grpId);
      if (panel.classList.contains('open')) {
        panel.classList.remove('open');
        chev.classList.remove('open');
      } else {
        panel.classList.add('open');
        chev.classList.add('open');
      }
    });

    grpDiv.appendChild(grpHdr);
    grpDiv.appendChild(artPanel);
    body.appendChild(grpDiv);
  });

  card.appendChild(body);

  // Toggle machine body
  hdr.addEventListener('click', function() {
    var b = document.getElementById('mbody-' + idx);
    var c = document.getElementById('mchev-' + idx);
    if (b.style.display === 'none') {
      b.style.display = '';
      c.classList.remove('collapsed');
    } else {
      b.style.display = 'none';
      c.classList.add('collapsed');
    }
  });

  return card;
}

function render(d) {
  // KPI Row 1
  document.getElementById('kv-bestand').textContent = fmtKgShort(d.gesamt_bestand);
  document.getElementById('kv-ytd').textContent     = fmtKgShort(d.gesamt_ytd);
  document.getElementById('kv-vm').textContent      = fmtKgShort(d.gesamt_vormonat);
  if (d.vormonat_label) {
    document.getElementById('kl-vm').textContent = d.vormonat_label;
  }

  // KPI Row 2: per Maschine
  var machRow = document.getElementById('kpi-mach-row');
  (d.maschinen || []).forEach(function(m) {
    var card = document.createElement('div');
    card.className = 'kpi-card';
    card.innerHTML =
      '<div class="kpi-label">' + m.label + '</div>' +
      '<div class="kpi-value">' + fmtKgShort(m.vormonat) + '</div>' +
      '<div class="kpi-sub">Vormonat &bull; Bestand: ' + fmtKgShort(m.bestand) + '</div>';
    machRow.appendChild(card);
  });

  // KPI Row 3: per Material (global)
  var matRow = document.getElementById('kpi-mat-row');
  var matSums = {};
  (d.maschinen || []).forEach(function(m) {
    (m.materialgruppen || []).forEach(function(mg) {
      if (!matSums[mg.key]) { matSums[mg.key] = {label:mg.label, vm:0, bestand:0}; }
      matSums[mg.key].vm      += mg.vormonat || 0;
      matSums[mg.key].bestand += mg.bestand  || 0;
    });
  });
  var matOrder = ['Stiftdraht','Kaltstauchdraht','Edelstahl'];
  matOrder.forEach(function(k) {
    if (!matSums[k]) return;
    var s = matSums[k];
    var card = document.createElement('div');
    card.className = 'kpi-card';
    card.innerHTML =
      '<div class="kpi-label">' + s.label + '</div>' +
      '<div class="kpi-value" style="font-size:17px">' + fmtKgShort(s.vm) + '</div>' +
      '<div class="kpi-sub">Vormonat &bull; Bestand: ' + fmtKgShort(s.bestand) + '</div>';
    matRow.appendChild(card);
  });

  // Timestamp
  if (d.timestamp) {
    var ts = new Date(d.timestamp);
    document.getElementById('ts-bar').textContent =
      'Stand: ' + ts.toLocaleDateString('de-DE') + ' ' + ts.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  }

  // Machine widgets
  var container = document.getElementById('mach-widgets');
  (d.maschinen || []).forEach(function(mach, idx) {
    container.appendChild(buildMachWidget(mach, idx));
  });

  document.getElementById('root-loading').style.display = 'none';
  document.getElementById('root-data').style.display    = '';
}

// Fetch
fetch('_data/material.json?t=' + Date.now())
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(d) {
    if (!d || d._kein_datenstand) {
      document.getElementById('root-loading').textContent = 'Noch keine Daten vorhanden.';
      return;
    }
    render(d);
  })
  .catch(function(e) {
    document.getElementById('root-loading').textContent = 'Fehler beim Laden: ' + e.message;
    document.getElementById('root-loading').style.color = '#dc2626';
  });

</script>
</body>
</html>
